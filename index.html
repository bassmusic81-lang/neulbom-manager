<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="늘봄관리">
<meta name="theme-color" content="#1F3864">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>정라초 늘봄 관리</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --primary:#1F3864;--primary2:#833C00;--accent:#4472C4;
  --bg:#F4F6FB;--card:#fff;--danger:#C00000;
  --muted:#8892A4;--border:#E2E8F0;--text:#1A1A2E;
  --green:#2C5F2E;
}
html,body{height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;color:var(--text);}
#app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;position:relative;overflow:hidden;}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.screen.hidden{display:none;}

/* 헤더 */
.header{padding:env(safe-area-inset-top,20px) 20px 20px;padding-top:calc(env(safe-area-inset-top,0px) + 20px);}
.header h1{color:#fff;font-size:20px;font-weight:800;}
.header .sub{color:rgba(255,255,255,0.7);font-size:12px;margin-top:2px;}
.back-btn{color:#fff;font-size:20px;background:none;border:none;cursor:pointer;margin-bottom:8px;padding:4px 0;}

/* 탭바 */
#tabbar{display:flex;background:#fff;border-top:1px solid var(--border);box-shadow:0 -2px 8px rgba(0,0,0,0.08);padding-bottom:env(safe-area-inset-bottom,0px);}
.tab-btn{flex:1;padding:10px 4px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;}
.tab-btn .icon{font-size:20px;}
.tab-btn .label{font-size:10px;color:var(--muted);font-weight:600;}
.tab-btn.active .label{color:var(--accent);}

/* 카드 */
.card{background:#fff;border-radius:14px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,0.07);margin-bottom:12px;}

/* 배지 */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;margin-right:4px;}

/* 검색바 */
.search-bar{padding:12px;background:#fff;border-bottom:1px solid var(--border);}
.search-bar input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;font-size:14px;outline:none;}
.search-bar input:focus{border-color:var(--accent);}

/* 필터 탭 */
.filter-tabs{display:flex;overflow-x:auto;padding:10px 12px;gap:6px;background:#fff;border-bottom:1px solid var(--border);}
.filter-tabs::-webkit-scrollbar{display:none;}
.filter-tab{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;}
.filter-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}

/* 학생 아이템 */
.student-item{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;cursor:pointer;background:#fff;}
.student-item:active{background:#f5f5f5;}
.stu-avatar{width:40px;height:40px;border-radius:20px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0;}
.stu-info{flex:1;}
.stu-name{font-weight:700;font-size:15px;}
.stu-phone{font-size:12px;color:var(--accent);font-weight:600;margin-top:2px;}
.stu-note{font-size:11px;color:var(--danger);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* 모달 */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:9999;display:flex;align-items:flex-end;}
.modal-overlay.hidden{display:none;}
.modal-sheet{background:var(--bg);border-radius:24px 24px 0 0;width:100%;max-height:90dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.modal-header{border-radius:24px 24px 0 0;padding:18px;}
.modal-header h2{color:#fff;font-size:20px;font-weight:900;}
.modal-header .cls-label{color:rgba(255,255,255,0.8);font-size:12px;}
.modal-close{background:rgba(255,255,255,0.2);border:none;border-radius:20px;width:34px;height:34px;color:#fff;font-size:16px;cursor:pointer;}
.modal-body{padding:14px;}

/* 출석부 */
.att-row{display:flex;align-items:center;border-bottom:1px solid var(--border);}
.att-info{flex:1;padding:10px 14px;cursor:pointer;}
.att-num{font-size:11px;color:var(--muted);min-width:22px;display:inline-block;text-align:right;margin-right:8px;}
.att-name{font-size:13px;font-weight:700;}
.att-status-btn{padding:10px 12px;border:none;background:none;cursor:pointer;display:flex;align-items:center;gap:4px;border-left:1px solid var(--border);min-width:82px;}
.att-dropdown{background:#fff;border-bottom:1px solid var(--border);padding:8px;display:flex;flex-wrap:wrap;gap:6px;}
.att-opt{flex:1;min-width:60px;padding:7px 8px;border-radius:20px;border:1.5px solid;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;font-size:11px;font-weight:700;}

/* 시간표 */
.tt-table{width:100%;border-collapse:collapse;}
.tt-table th,.tt-table td{border:1px solid var(--border);padding:4px 2px;text-align:center;font-size:9px;}
.tt-table th{font-weight:700;}
.subj-cell{border-radius:6px;padding:4px 3px;cursor:pointer;font-weight:800;font-size:9px;line-height:1.3;}

/* 캘린더 */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);}
.cal-cell{background:#fff;padding:6px 2px;text-align:center;cursor:pointer;min-height:44px;}
.cal-cell.today .day-num{background:var(--green);color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;margin:0 auto;}
.cal-cell.selected{background:#E8F5E9;}
.cal-dot{width:5px;height:5px;border-radius:50%;margin:2px auto 0;}

/* 홈 배너 */
.banner{background:var(--danger);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.banner-text h3{color:#fff;font-size:14px;font-weight:800;}
.banner-text p{color:rgba(255,255,255,0.85);font-size:11px;margin-top:1px;}
.banner-btn{background:rgba(255,255,255,0.25);border-radius:8px;padding:5px 10px;color:#fff;font-size:12px;font-weight:700;}

/* 홈 통계 */
.stats-row{display:flex;justify-content:space-around;background:rgba(255,255,255,0.12);border-radius:12px;padding:12px;margin-top:16px;}
.stat{text-align:center;}
.stat .val{color:#fff;font-size:24px;font-weight:900;}
.stat .lbl{color:#fff;font-size:11px;opacity:0.8;}
.stat-div{width:1px;background:rgba(255,255,255,0.2);}

/* 메뉴 그리드 */
.menu-grid{display:flex;flex-wrap:wrap;gap:12px;padding:16px;}
.menu-item{border-radius:14px;padding:16px;border:1.5px solid;cursor:pointer;}
.menu-item.wide{width:100%;}
.menu-item.half{width:calc(50% - 6px);}
.menu-item .menu-icon{font-size:28px;margin-bottom:8px;}
.menu-item h3{font-size:15px;font-weight:800;margin-bottom:3px;}
.menu-item p{font-size:11px;color:var(--muted);}

/* 요일 탭 */
.day-tabs{display:flex;background:#fff;border-bottom:1px solid var(--border);}
.day-tab{flex:1;padding:12px 4px;border:none;background:none;cursor:pointer;text-align:center;border-bottom:3px solid transparent;}
.day-tab .day{font-weight:700;font-size:14px;}
.day-tab .date{font-size:10px;color:var(--muted);}

/* 세션 카드 */
.session-card{border-radius:12px;overflow:hidden;margin-bottom:10px;}
.session-header{padding:10px 12px;}
.session-header h3{color:#fff;font-weight:800;font-size:14px;}

/* 특이사항 */
.incident-card{border-left:4px solid;border-radius:12px;padding:12px;background:#fff;margin-bottom:10px;}

/* 팝업 */
.popup{background:#fff;border-radius:18px;padding:0;overflow:hidden;width:calc(100% - 40px);max-height:80dvh;overflow-y:auto;}
.popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px;}
.popup-overlay.hidden{display:none;}

a{color:inherit;text-decoration:none;}
button{font-family:inherit;}
</style>
</head>

        <div style="display:flex;align-items:center;gap:12px;">
          <div id="stu-modal-avatar" style="width:48px;height:48px;border-radius:24px;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;"></div>
          <div>
            <div id="stu-modal-name" style="color:#fff;font-size:20px;font-weight:900;"></div>
            <div id="stu-modal-cls" style="color:rgba(255,255,255,0.8);font-size:12px;"></div>
          </div>
        </div>
        <button class="modal-close" onclick="closeStuModal()">✕</button>
      </div>
      <div id="stu-modal-phone"></div>
    </div>
    <div class="modal-body" id="stu-modal-body"></div>
  </div>
</div>

<!-- 팝업 -->
<div class="popup-overlay hidden" id="popup-overlay" onclick="closePopup()">

</div>

    const roster = STUDENTS.filter(s=>s.grade===g&&s.cls===cl);
    for(const stu of roster){
      if(s1&&s1!=="—"){
        const key=`${s1}(1교시)`;
        if(!sessions[key]) sessions[key]=[];
        sessions[key].push(stu);
      }
      if(s2&&s2!=="—"){
        const key=`${s2}(2교시)`;
        if(!sessions[key]) sessions[key]=[];
        sessions[key].push(stu);
      }
      if(s3){
        const key=`${s3}(3교시)`;
        if(!sessions[key]) sessions[key]=[];
        sessions[key].push(stu);
      }
    }
  }
  const dc = {월:"#4472C4",화:"#70AD47",수:"#ED7D31",목:"#9B59B6",금:"#C00000"};

  document.getElementById('screen-attendance').innerHTML = `

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="color:#fff;font-size:20px;font-weight:800">요일별 출석부</div>
        <button onclick="resetAtt()" style="background:rgba(255,255,255,0.2);border:none;border-radius:8px;padding:5px 10px;color:#fff;font-size:11px;font-weight:700;cursor:pointer">🔄 초기화</button>
      </div>
      <div style="color:rgba(255,255,255,0.7);font-size:11px">${currentDay}요일(${DAY_DATES[currentDay]}) · 출석 체크 시 자동 저장</div>
    </div>
    <div class="day-tabs">
      ${DAYS.map(d=>`
        <button class="day-tab ${currentDay===d?'active':''}" onclick="currentDay='${d}';renderAttendance()" 
          style="border-bottom-color:${currentDay===d?dc[d]:'transparent'}">
          <div class="day" style="color:${currentDay===d?dc[d]:'var(--muted)'}">${d}</div>
          <div class="date">${DAY_DATES[d]}</div>
        </button>`).join('')}
    </div>
    <div style="padding:12px">
      ${Object.entries(sessions).map(([session,stus])=>{
        const subj = session.split('(')[0];
        const color = gc(subj);
        const instr = INSTRUCTOR_MAP[subj];
        const stats = {present:0,absent:0,late:0,early:0,none:0};
        stus.forEach(s=>{
          const st = attData[`${session}|${s.id}`]||'';
          if(st==='present') stats.present++;
          else if(st==='absent') stats.absent++;
          else if(st==='late') stats.late++;
          else if(st==='early') stats.early++;
          else stats.none++;
        });
        return `
          <div class="session-card" style="margin-bottom:10px">
            <div class="session-header" style="background:${color}">
              <div style="display:flex;justify-content:space-between;align-items:center">
                <div style="display:flex;align-items:center;gap:8px;flex:1">
                  <span style="color:#fff;font-weight:800;font-size:14px">${session}</span>
                  ${instr?`<button onclick="location.href='tel:${instr.phone}'" style="background:rgba(255,255,255,0.2);border:none;border-radius:10px;padding:2px 7px;color:#fff;font-size:10px;font-weight:600;cursor:pointer">👩‍🏫 ${instr.name}</button>`:''}
                </div>
                <div style="display:flex;gap:6px;align-items:center">
                  <button onclick="markAllPresent('${session}',${JSON.stringify(stus.map(s=>s.id))})" 
                    style="background:rgba(255,255,255,0.25);border:none;border-radius:8px;padding:3px 8px;color:#fff;font-size:11px;font-weight:700;cursor:pointer">✓ 전원출석</button>
                  <span style="background:rgba(255,255,255,0.2);border-radius:10px;padding:2px 8px;color:#fff;font-size:12px;font-weight:700">${stus.length}명</span>
                </div>
              </div>
              ${stats.present+stats.absent+stats.late+stats.early>0?`
              <div style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap">
                ${stats.present>0?`<span style="background:rgba(255,255,255,0.25);border-radius:6px;padding:2px 6px;color:#fff;font-size:10px">✓ 출석 ${stats.present}</span>`:''}
                ${stats.absent>0?`<span style="background:rgba(255,100,100,0.4);border-radius:6px;padding:2px 6px;color:#fff;font-size:10px">✗ 결석 ${stats.absent}</span>`:''}
                ${stats.late>0?`<span style="background:rgba(255,200,0,0.35);border-radius:6px;padding:2px 6px;color:#fff;font-size:10px">▲ 지각 ${stats.late}</span>`:''}
                ${stats.early>0?`<span style="background:rgba(100,180,255,0.35);border-radius:6px;padding:2px 6px;color:#fff;font-size:10px">◀ 조기 ${stats.early}</span>`:''}
              </div>`:''}

              const dropKey=`${session}|${s.id}`;
              const status=attData[dropKey]||'';
              const stObj=ATT_STATUS.find(a=>a.key===status)||ATT_STATUS[0];
              const rowBg=status==='absent'?'#FFF5F5':status==='present'?'#F5FFF6':status==='late'?'#FFFBF0':status==='early'?'#F0F7FF':(i%2===0?'#fff':'#FAFAFA');

              <div>
                <div class="att-row" style="background:${rowBg}">
                  <div class="att-info" onclick="openStuModal('${s.id}')">
                    <span class="att-num">${s.num}</span>
                    <span class="att-name" style="color:${s.note?'var(--danger)':'var(--text)'}">${s.name}</span>
                    ${s.note?'<span style="font-size:12px">⚠</span>':''}
                    <span style="font-size:10px;color:var(--muted);margin-left:4px">${s.clsLabel}</span>
                  </div>
                  <button class="att-status-btn" onclick="toggleDrop('${dropKey}')" style="background:${stObj.bg}">
                    <span style="font-size:13px;font-weight:800;color:${stObj.color}">${stObj.icon}</span>
                    <span style="font-size:11px;font-weight:700;color:${stObj.color};flex:1">${stObj.label}</span>
                    <span style="font-size:9px;color:${stObj.color}">${openDrop===dropKey?'▲':'▼'}</span>
                  </button>
                </div>
                ${openDrop===dropKey?`
                <div class="att-dropdown">
                  ${ATT_STATUS.map(opt=>`
                    <button class="att-opt" onclick="setAttStatus('${dropKey}',event)"
                      data-key="${opt.key}"
                      style="background:${status===opt.key?opt.color:opt.bg};border-color:${opt.color}${status===opt.key?'':'44'};color:${status===opt.key?'#fff':opt.color}">
                      <span>${opt.icon}</span><span>${opt.label}</span>
                    </button>`).join('')}
                </div>`:''}
              </div>`;
            }).join('')}
          </div>`;
      }).join('')}
    </div>
  `;
}

function toggleDrop(key){
  openDrop = openDrop===key ? null : key;
  renderAttendance();
}

function setAttStatus(dropKey, e){
  const optKey = e.currentTarget.dataset.key;
  attData[dropKey] = optKey;
  saveAtt();
  openDrop = null;
  renderAttendance();
}

function markAllPresent(session, ids){
  ids.forEach(id=>{ attData[`${session}|${id}`]='present'; });
  saveAtt();
  renderAttendance();
}

function resetAtt(){
  if(!confirm('이 요일 출석 기록을 초기화할까요?')) return;
  Object.keys(attData).forEach(k=>{ delete attData[k]; });
  saveAtt();
  renderAttendance();
}

// ── 학사일정 ──
function renderCalendar(){
  const y=currentCalMonth.getFullYear(), m=currentCalMonth.getMonth();
  const today=new Date();
  const todayKey=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const monthNames=["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];
  const dayNames=["일","월","화","수","목","금","토"];
  const daysInMonth=new Date(y,m+1,0).getDate();
  const firstDay=new Date(y,m,1).getDay();
  const cells=[...Array(firstDay).fill(null),...Array.from({length:daysInMonth},(_,i)=>i+1)];
  while(cells.length%7!==0) cells.push(null);

  document.getElementById('screen-calendar').innerHTML = `
    <div style="background:var(--green);padding:20px;padding-top:calc(env(safe-area-inset-top,0px)+20px)">
      <button class="back-btn" onclick="goTo('home')">← 홈으로</button>
      <div style="color:#fff;font-size:20px;font-weight:800">학사일정</div>
      <div style="color:#fff;font-size:12px;opacity:0.7">2026년도 1학기</div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding:16px;background:#fff;border-bottom:1px solid var(--border)">
      <button onclick="prevMonth()" style="background:none;border:none;font-size:24px;color:var(--green);cursor:pointer;padding:4px 8px">‹</button>
      <span style="font-size:18px;font-weight:800">${y}년 ${monthNames[m]}</span>
      <button onclick="nextMonth()" style="background:none;border:none;font-size:24px;color:var(--green);cursor:pointer;padding:4px 8px">›</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);background:#F0F4F0;padding:6px 0">
      ${dayNames.map((d,i)=>`<div style="text-align:center;font-size:11px;font-weight:700;color:${i===0?'#E53935':i===6?'#1565C0':'#555'}">${d}</div>`).join('')}
    </div>
    <div class="cal-grid">
      ${Array.from({length:cells.length/7},(_,row)=>
        cells.slice(row*7,(row+1)*7).map((d,col)=>{
          if(!d) return `<div class="cal-cell" style="border-bottom:1px solid #F0F0F0"></div>`;
          const key=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          const isToday=key===todayKey;
          const hasEv=!!CALENDAR[key];
          const isHol=CALENDAR[key]?.some(e=>e.type==='holiday');
          const dayColor=col===0?'#E53935':col===6?'#1565C0':isHol?'#E53935':'var(--text)';
          return `<div class="cal-cell" style="border-bottom:1px solid #F0F0F0" onclick="showCalEvent('${key}')">
            <div style="${isToday?'background:var(--green);color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;margin:0 auto;':''}font-size:13px;font-weight:${isToday?'800':'400'};color:${isToday?'#fff':dayColor}">${d}</div>
            ${hasEv?`<div style="width:5px;height:5px;border-radius:50%;background:${isHol?'#E53935':'#FF6B35'};margin:2px auto 0"></div>`:''}
          </div>`;
        }).join('')
      ).join('')}
    </div>
    <div style="margin:12px;border-radius:12px;overflow:hidden;border:1px solid #C8E6C9">
      <div style="background:var(--green);padding:10px"><span style="color:#fff;font-weight:800;font-size:13px">${monthNames[m]} 주요 일정</span></div>
      ${Array.from({length:daysInMonth},(_,i)=>i+1).filter(d=>CALENDAR[`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`]).map(d=>{
        const key=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const evs=CALENDAR[key];
        const isHol=evs.some(e=>e.type==='holiday');
        const dayN=dayNames[new Date(y,m,d).getDay()];
        return `<div style="padding:10px;border-bottom:1px solid #F0F0F0;display:flex;gap:10px">
          <div style="width:40px;text-align:center">
            <div style="font-size:13px;font-weight:700;color:${isHol?'#E53935':'var(--green)'}">${d}일</div>
            <div style="font-size:10px;color:var(--muted)">${dayN}</div>
          </div>
          <div style="flex:1">
            ${evs.map(ev=>`<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
              <div style="width:6px;height:6px;border-radius:50%;background:${ev.type==='holiday'?'#E53935':ev.type==='vacation'?'#1565C0':'#FF6B35'}"></div>
              <span style="font-size:12px">${ev.label}</span>
            </div>`).join('')}
          </div>
        </div>`;
      }).join('') || '<div style="padding:12px;text-align:center;color:var(--muted);font-size:13px">이번 달 등록된 일정 없음</div>'}
    </div>
  `;
}

function showCalEvent(key){
  const evs = CALENDAR[key];
  if(!evs) return;
  const [y,m,d] = key.split('-');
  showPopup(`
    <div style="background:var(--green);padding:16px;border-radius:18px 18px 0 0">
      <div style="color:#fff;font-size:16px;font-weight:800">${parseInt(m)}월 ${parseInt(d)}일</div>
    </div>
    <div style="padding:16px">
      ${evs.map(ev=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)">
        <div style="width:8px;height:8px;border-radius:50%;background:${ev.type==='holiday'?'#E53935':ev.type==='vacation'?'#1565C0':'#FF6B35'}"></div>
        <span style="font-size:14px;font-weight:600">${ev.label}</span>
      </div>`).join('')}
      <button onclick="closePopup()" style="width:100%;background:var(--green);color:#fff;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;margin-top:14px">닫기</button>
    </div>
  `);
}

function prevMonth(){ currentCalMonth=new Date(currentCalMonth.getFullYear(),currentCalMonth.getMonth()-1,1); renderCalendar(); }
function nextMonth(){ currentCalMonth=new Date(currentCalMonth.getFullYear(),currentCalMonth.getMonth()+1,1); renderCalendar(); }

// ── 팝업 ──
function showPopup(html){
  document.getElementById('popup-content').innerHTML=html;
  document.getElementById('popup-overlay').classList.remove('hidden');
}
function closePopup(){
  document.getElementById('popup-overlay').classList.add('hidden');
}

// ── 초기화 ──
renderHome();

// Service Worker 등록
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
</script>
</body>
</html>
