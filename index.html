<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --primary:#1F3864;--primary2:#833C00;--accent:#4472C4;
  --bg:#F4F6FB;--card:#fff;--danger:#C00000;
  --muted:#8892A4;--border:#E2E8F0;--text:#1A1A2E;
  --green:#2C5F2E;
}
html,body{height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;color:var(--text);}
#app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;position:relative;}
#screens{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;min-height:0;}
.screen{min-height:100%;}
.screen.hidden{display:none;}

/* 헤더 */
.header{padding:env(safe-area-inset-top,20px) 20px 20px;padding-top:calc(env(safe-area-inset-top,0px) + 20px);}
.header h1{color:#fff;font-size:20px;font-weight:800;}
.header .sub{color:rgba(255,255,255,0.7);font-size:12px;margin-top:2px;}
.back-btn{color:#fff;font-size:20px;background:none;border:none;cursor:pointer;margin-bottom:8px;padding:4px 0;}

/* 탭바 */
#nav-bar{display:flex;background:#fff;border-top:1px solid var(--border);box-shadow:0 -2px 8px rgba(0,0,0,0.08);padding-bottom:env(safe-area-inset-bottom,0px);}
.tab-btn{flex:1;padding:10px 4px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;}
.tab-btn .icon{font-size:20px;}
.tab-btn .label{font-size:10px;color:var(--muted);font-weight:600;}
.tab-btn.active .label{color:var(--accent);}

/* 카드 */
.card{background:#fff;border-radius:14px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,0.07);margin-bottom:12px;}

/* 배지 */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;margin-right:4px;}

/* 검색바 */
.search-bar{padding:12px;background:#fff;border-bottom:1px solid var(--border);}
.search-bar input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;font-size:14px;outline:none;}
.search-bar input:focus{border-color:var(--accent);}

/* 필터 탭 */
.filter-tabs{display:flex;overflow-x:auto;padding:10px 12px;gap:6px;background:#fff;border-bottom:1px solid var(--border);}
.filter-tabs::-webkit-scrollbar{display:none;}
.filter-tab{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;}
.filter-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}

/* 학생 아이템 */
.student-item{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;cursor:pointer;background:#fff;}
.student-item:active{background:#f5f5f5;}
.stu-avatar{width:40px;height:40px;border-radius:20px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0;}
.stu-info{flex:1;}
.stu-name{font-weight:700;font-size:15px;}
.stu-phone{font-size:12px;color:var(--accent);font-weight:600;margin-top:2px;}
.stu-note{font-size:11px;color:var(--danger);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* 모달 */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:9999;display:flex;align-items:flex-end;}
.modal-overlay.hidden{display:none;}
.modal-sheet{background:var(--bg);border-radius:24px 24px 0 0;width:100%;max-height:90dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.modal-header{border-radius:24px 24px 0 0;padding:18px;}
.modal-header h2{color:#fff;font-size:20px;font-weight:900;}
.modal-header .cls-label{color:rgba(255,255,255,0.8);font-size:12px;}
.modal-close{background:rgba(255,255,255,0.2);border:none;border-radius:20px;width:34px;height:34px;color:#fff;font-size:16px;cursor:pointer;}
.modal-body{padding:14px;}

/* 출석부 */
.att-row{display:flex;align-items:center;border-bottom:1px solid var(--border);}
.att-info{flex:1;padding:10px 14px;cursor:pointer;}
.att-num{font-size:11px;color:var(--muted);min-width:22px;display:inline-block;text-align:right;margin-right:8px;}
.att-name{font-size:13px;font-weight:700;}
.att-status-btn{padding:10px 12px;border:none;background:none;cursor:pointer;display:flex;align-items:center;gap:4px;border-left:1px solid var(--border);min-width:82px;}
.att-dropdown{background:#fff;border-bottom:1px solid var(--border);padding:8px;display:flex;flex-wrap:wrap;gap:6px;}
.att-opt{flex:1;min-width:60px;padding:7px 8px;border-radius:20px;border:1.5px solid;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;font-size:11px;font-weight:700;}

/* 시간표 */
.tt-table{width:100%;border-collapse:collapse;}
.tt-table th,.tt-table td{border:1px solid var(--border);padding:4px 2px;text-align:center;font-size:9px;}
.tt-table th{font-weight:700;}
.subj-cell{border-radius:6px;padding:4px 3px;cursor:pointer;font-weight:800;font-size:9px;line-height:1.3;}

/* 캘린더 */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);}
.cal-cell{background:#fff;padding:6px 2px;text-align:center;cursor:pointer;min-height:44px;}
.cal-cell.today .day-num{background:var(--green);color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;margin:0 auto;}
.cal-cell.selected{background:#E8F5E9;}
.cal-dot{width:5px;height:5px;border-radius:50%;margin:2px auto 0;}

/* 홈 배너 */
.banner{background:var(--danger);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.banner-text h3{color:#fff;font-size:14px;font-weight:800;}
.banner-text p{color:rgba(255,255,255,0.85);font-size:11px;margin-top:1px;}
.banner-btn{background:rgba(255,255,255,0.25);border-radius:8px;padding:5px 10px;color:#fff;font-size:12px;font-weight:700;}

/* 홈 통계 */
.stats-row{display:flex;justify-content:space-around;background:rgba(255,255,255,0.12);border-radius:12px;padding:12px;margin-top:16px;}
.stat{text-align:center;}
.stat .val{color:#fff;font-size:24px;font-weight:900;}
.stat .lbl{color:#fff;font-size:11px;opacity:0.8;}
.stat-div{width:1px;background:rgba(255,255,255,0.2);}

/* 메뉴 그리드 */
.menu-grid{display:flex;flex-wrap:wrap;gap:12px;padding:16px;}
.menu-item{border-radius:14px;padding:16px;border:1.5px solid;cursor:pointer;}
.menu-item.wide{width:100%;}
.menu-item.half{width:calc(50% - 6px);}
.menu-item .menu-icon{font-size:28px;margin-bottom:8px;}
.menu-item h3{font-size:15px;font-weight:800;margin-bottom:3px;}
.menu-item p{font-size:11px;color:var(--muted);}

/* 요일 탭 */
.day-tabs{display:flex;background:#fff;border-bottom:1px solid var(--border);}
.day-tab{flex:1;padding:12px 4px;border:none;background:none;cursor:pointer;text-align:center;border-bottom:3px solid transparent;}
.day-tab .day{font-weight:700;font-size:14px;}
.day-tab .date{font-size:10px;color:var(--muted);}

/* 세션 카드 */
.session-card{border-radius:12px;overflow:hidden;margin-bottom:10px;}
.session-header{padding:10px 12px;}
.session-header h3{color:#fff;font-weight:800;font-size:14px;}

/* 특이사항 */
.incident-card{border-left:4px solid;border-radius:12px;padding:12px;background:#fff;margin-bottom:10px;}

/* 팝업 */
.popup{background:#fff;border-radius:18px;padding:0;overflow:hidden;width:calc(100% - 40px);max-height:80dvh;overflow-y:auto;}
.popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px;}
.popup-overlay.hidden{display:none;}

a{color:inherit;text-decoration:none;}
button{font-family:inherit;}


/* ── 가로모드 / 데스크탑 ── */
@media (min-width: 600px) and (orientation: landscape),
       (min-width: 900px) {
  #app {
    display: grid;
    grid-template-columns: 80px 1fr;
    grid-template-rows: 1fr;
    grid-template-areas: "nav main";
    height: 100dvh;
    max-width: 100%;
    overflow: hidden;
  }
  #banner { display: none !important; }
  #nav-bar {
    grid-area: nav;
    flex-direction: column;
    width: 80px;
    height: 100dvh;
    border-top: none;
    border-right: 1px solid var(--border);
    border-bottom: none;
    box-shadow: 2px 0 8px rgba(0,0,0,0.06);
    padding: 16px 0;
    justify-content: flex-start;
    gap: 4px;
    overflow-y: auto;
    position: sticky;
    top: 0;
  }
  .tab-btn {
    flex-direction: column;
    padding: 12px 6px;
    font-size: 10px;
    border-radius: 10px;
    margin: 0 4px;
    width: calc(100% - 8px);
  }
  .tab-btn .icon { font-size: 22px; }
  #screens {
    grid-area: main;
    overflow-y: auto;
    overflow-x: hidden;
    height: 100dvh;
    max-width: 100%;
  }
  .screen { height: auto; min-height: 100%; }
}

// ── 데이터 ──
function applyAvatarPhotos(root){
  // data-pk가 있고 사진이 있는 아바타에 줌 클릭 핸들러 추가
  (root||document).querySelectorAll('.stu-avatar[data-pk]').forEach(el=>{
    const pk = el.dataset.pk;
    if(!pk) return;
    // PHOTO_LARGE에 사진이 있으면 background-image를 직접 적용 (CSS shorthand 충돌 방지)
    if(window.PHOTO_LARGE && window.PHOTO_LARGE[pk]){
      // 인라인 background를 보존하되, background-image만 덮어씀
      el.style.backgroundImage = `url("${window.PHOTO_LARGE[pk]}")`;
      el.style.backgroundSize = 'cover';
      el.style.backgroundPosition = 'center';
      el.style.color = 'transparent';
      el.style.cursor = 'pointer';
      // 클릭 핸들러는 한 번만 등록
      if(!el._photoHandled){
        el._photoHandled = true;
        el.addEventListener('click', function(e){
          e.stopPropagation();
          const currentPk = this.dataset.pk;
          if(!window.PHOTO_LARGE || !window.PHOTO_LARGE[currentPk]) return;
          const nameEl = this.closest('.student-item, [style*="border-left"]')?.querySelector('.stu-name, [style*="font-weight:800"]');
          showPhotoZoom(currentPk, nameEl?.textContent?.trim() || currentPk);
        });
      }
    }
  });
}

function showPhotoZoom(pk, name){
  const src = window.PHOTO_LARGE && window.PHOTO_LARGE[pk];
  if(!src) return;
  // 기존 줌 오버레이 제거
  document.getElementById('photo-zoom-overlay')?.remove();
  const ov = document.createElement('div');
  ov.id = 'photo-zoom-overlay';
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;';
  ov.onclick = ()=>ov.remove();
  const img = document.createElement('img');
  img.src = src;
  img.style.cssText = 'max-width:85vw;max-height:75vh;border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,0.5);object-fit:contain;';
  const label = document.createElement('div');
  label.textContent = name;
  label.style.cssText = 'color:#fff;font-size:16px;font-weight:800;text-align:center;';
  const hint = document.createElement('div');
  hint.textContent = '탭하여 닫기';
  hint.style.cssText = 'color:rgba(255,255,255,0.5);font-size:12px;';
  ov.appendChild(img);
  ov.appendChild(label);
  ov.appendChild(hint);
  document.body.appendChild(ov);
}

// 이번주 월~금 날짜 동적 계산 (토·일은 다음주 기준)
function getThisWeekRange(){
  const today = new Date();
  const dow = today.getDay();
  const diff = dow === 6 ? 2 : dow === 0 ? 1 : 1 - dow;
  const mon = new Date(today); mon.setDate(today.getDate() + diff);
  const fri = new Date(mon);   fri.setDate(mon.getDate() + 4);
  const fmt = d => `${d.getMonth()+1}/${d.getDate()}`;
  return { mon:fmt(mon), fri:fmt(fri), label:`${fmt(mon)}~${fmt(fri)}` };
}

// 요일별 날짜 맵 (동적)
function buildDayDates(){
  const today = new Date();
  const dow = today.getDay();
  const diff = dow === 6 ? 2 : dow === 0 ? 1 : 1 - dow;
  const mon = new Date(today); mon.setDate(today.getDate() + diff);
  const days = ['월','화','수','목','금'];
  const map = {};
  days.forEach((d,i)=>{
    const dt = new Date(mon); dt.setDate(mon.getDate()+i);
    map[d] = `${dt.getMonth()+1}/${dt.getDate()}`;
  });
  return map;
}

// ── 노트 자동 파싱 → 수강 특수 일정 ──
function parseSpecialFromNote(note) {
  if(!note) return null;
  const ALL = ["월","화","수","목","금"];
  const sp = {};

  function daysIn(text) { return ALL.filter(d=>text.includes(d)); }
  function addTo(key, arr) {
    if(!arr.length) return;
    sp[key] = [...new Set([...(sp[key]||[]), ...arr])];
  }

  // 전체 취소 (월~금)
  if(/전체\s*취소|월~금.*취소/.test(note)) return { skipDays:[...ALL] };

  // 붙여쓰기 취소: "월취소"
  ALL.forEach(d => { if(note.includes(d+'취소') && !note.includes(d+'취소 후')) addTo('skipDays',[d]); });

  // "X 맞춤형 취소" / "X 취소" (단, "취소 후" 제외)
  for(const m of note.matchAll(/([월화수목금·]+)\s*(?:맞춤형\s*)?취소(?!\s*후)/g))
    addTo('skipDays', daysIn(m[1]));

  // "매일 1교시만"
  if(/매일.*1교시만/.test(note)) sp.skipS2Days=[...ALL];

  // "X 1교시만"
  for(const m of note.matchAll(/([월화수목금·]+)\s*1교시만/g))
    addTo('skipS2Days', daysIn(m[1]));

  // "X 1교시 후 ... 차량/하교" → 1교시 후 하교 = 2교시 취소
  for(const m of note.matchAll(/([월화수목금·]+)\s*1교시\s*(?:후|이후)[^/\n]*(?:차량|하교|귀가)/g))
    addTo('skipS2Days', daysIn(m[1]));

  // "X 2교시 제외/취소/결석"
  for(const m of note.matchAll(/([월화수목금·]+)\s*2교시\s*(?:제외|취소|결석)/g))
    addTo('skipS2Days', daysIn(m[1]));

  // "X → 1교시 취소" (컴퓨터방과후)
  for(const m of note.matchAll(/([월화수목금·]+)[^→\n]*→\s*1교시\s*취소/g))
    addTo('skipS1Days', daysIn(m[1]));

  // "X 1교시 결석"
  for(const m of note.matchAll(/([월화수목금·]+)\s*1교시\s*결석/g))
    addTo('skipS1Days', daysIn(m[1]));

  // "X 2교시 결석"
  for(const m of note.matchAll(/([월화수목금·]+)\s*2교시\s*결석/g))
    addTo('skipS2Days', daysIn(m[1]));

  // 로봇과학A 대체
  if(/화.*로봇과학A/.test(note)) sp.replaceS1={...(sp.replaceS1||{}),화:"로봇과학A"};

  return Object.keys(sp).length>0 ? sp : null;
}

function getStudentSpecial(nm, note) {
  const parsed = parseSpecialFromNote(note) || {};
  const override = MANUAL_OVERRIDE[nm] || {};
  const merged = {...parsed};
  for(const [k,v] of Object.entries(override)){
    if(Array.isArray(v))
      merged[k] = [...new Set([...(merged[k]||[]),...v])];
    else if(v && typeof v==='object')
      merged[k] = {...(merged[k]||{}), ...v};
    else merged[k]=v;
  }
  return Object.keys(merged).length>0 ? merged : null;
}

    forecastHtml=w.slice(0,7).map((d,i)=>{
      const dt=new Date(d.date);
      const dn=i===0?'오늘':i===1?'내일':dayNames[dt.getDay()]+'요일';
      const fc=parseInt(d.hourly?.[4]?.weatherCode||113);
      const hi=d.maxtempC, lo=d.mintempC;
      const pp=d.hourly?.[4]?.chanceofrain||0;
      return `<div style="flex:1;text-align:center;padding:6px 2px;min-width:38px;">
        <div style="font-size:10px;font-weight:700;color:${i===0?'var(--primary)':'var(--muted)'};">${dn}</div>

        <div style="font-size:9px;color:${pp>=60?'#1565C0':'#ccc'};margin-top:2px;">💧${pp}%</div>
      </div>`;
    }).join('');
  } else {
    const c=data.d.current, daily=data.d.daily;
    const code=c.weathercode??0;
    icon=WMO_ICON[code]||'🌤'; desc=WMO_DESC[code]||'맑음';
    temp=Math.round(c.temperature_2m); feel=Math.round(c.apparent_temperature);
    wind=c.windspeed_10m?.toFixed(1)||'-';
    forecastHtml=daily.time.slice(0,7).map((date,i)=>{
      const dt=new Date(date);
      const dn=i===0?'오늘':i===1?'내일':dayNames[dt.getDay()]+'요일';
      const fc=daily.weathercode?.[i]??0;
      const hi=Math.round(daily.temperature_2m_max[i]), lo=Math.round(daily.temperature_2m_min[i]);
      const pp=daily.precipitation_probability_max?.[i]??0;
      return `<div style="flex:1;text-align:center;padding:6px 2px;min-width:38px;">
        <div style="font-size:10px;font-weight:700;color:${i===0?'var(--primary)':'var(--muted)'};">${dn}</div>
        <div style="font-size:20px;line-height:1.5;">${WMO_ICON[fc]||'🌤'}</div>
        <div style="font-size:11px;font-weight:800;color:#E53935;">${hi}°</div>
        <div style="font-size:10px;color:#1565C0;">${lo}°</div>
        <div style="font-size:9px;color:${pp>=60?'#1565C0':'#ccc'};margin-top:2px;">💧${pp}%</div>
      </div>`;
    }).join('');
  }

  el.innerHTML=`<div style="width:100%;">
    <div style="display:flex;align-items:center;gap:14px;padding-bottom:12px;margin-bottom:12px;border-bottom:1px solid #f0f0f0;">
      <div style="font-size:40px;line-height:1;">${icon}</div>
      <div style="flex:1;">
        <div style="font-size:13px;font-weight:700;color:#333;">${desc}</div>
        <div style="font-size:28px;font-weight:900;color:#1F3864;line-height:1.1;">${temp}°<span style="font-size:13px;color:#888;font-weight:400;">C</span></div>
        <div style="font-size:11px;color:#888;margin-top:2px;">체감 ${feel}° · 바람 ${wind}m/s</div>
      </div>
      <div style="text-align:right;flex-shrink:0;">
        <div style="font-size:10px;color:#aaa;">강릉시</div>
        <div style="font-size:10px;color:#aaa;margin-top:2px;">${new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})} 기준</div>
      </div>
    </div>
    <div style="display:flex;">${forecastHtml}</div>
  </div>`;
}

function openDaycareStudent(cls, name){
  // 1. STUDENTS에서 먼저 찾기 (clsKey 비교)
  const stu = STUDENTS.find(s=>s.name===name && s.clsKey===cls);
  if(stu){ openStuModal(stu.id); return; }

  // 2. DAYCARE에서 찾기 (돌봄 전용 학생)
  let found=null, room='';
  for(const [r,list] of Object.entries(DAYCARE)){
    const s=list.find(s=>s.name===name && s.cls===cls);
    if(s){found=s;room=r;break;}
  }
  if(!found){
    // cls 무시하고 이름만으로 재시도
    for(const [r,list] of Object.entries(DAYCARE)){
      const s=list.find(s=>s.name===name);
      if(s){found=s;room=r;break;}
    }
  }
  if(!found) return;

  const rc={'돌봄1교실':'#5C3D99','돌봄2교실':'#7B3F00'}[room]||'#5C3D99';
  const typeBg={맞벌이:"#E3F2FD",한부모:"#FFEBEE",다자녀:"#E8F5E9"};
  const typeColor={맞벌이:"#1565C0",한부모:"#C00000",다자녀:"#2E7D32"};

  // STUDENTS note도 병합 (같은 이름, 같은 cls 학생)
  const stuNote = (STUDENTS.find(s=>s.name===name && s.clsKey===found.cls)||{}).note||'';
  const daycareNote = found.note||'';
  const allNote = [stuNote, daycareNote].filter(Boolean).join('\n');

  // INCIDENTS에서 해당 학생 관련 기록 수집
  const incidents = INCIDENTS.filter(inc=>
    inc.student && (inc.student.includes(name)) ||
    inc.content && inc.content.includes(name)
  );
  const incHtml = incidents.length ? `

  const matched = [];
  for(const [room, list] of Object.entries(DAYCARE)){
    for(const s of list){
      if(s.note && s.note.includes(noteText.trim())){
        matched.push({...s, room});

  if(!matched.length) return;

  const typeColor={맞벌이:"#1565C0",한부모:"#C00000",다자녀:"#2E7D32"};

// ── GitHub 업데이트 ──
async function forceUpdate(){
  const btn = document.getElementById('update-btn');
  const icon = document.getElementById('update-icon');
  if(!btn) return;

  // 로딩 상태
  btn.style.opacity='0.6';
  btn.style.pointerEvents='none';
  if(icon) icon.textContent='⏳';

  try {
    // 1. 서비스워커에 캐시 삭제 요청
    if('serviceWorker' in navigator && navigator.serviceWorker.controller){
      navigator.serviceWorker.controller.postMessage({type:'FORCE_UPDATE'});
    }

    // 2. 모든 캐시 직접 삭제
    const keys = await caches.keys();
    await Promise.all(keys.map(k=>caches.delete(k)));

    // 3. 서비스워커 업데이트 확인
    if('serviceWorker' in navigator){
      const reg = await navigator.serviceWorker.getRegistration();
      if(reg) await reg.update();
    }

    // 4. 완료 후 페이지 새로고침
    if(icon) icon.textContent='✅';
    setTimeout(()=>{ location.reload(true); }, 600);

  } catch(e) {
    if(icon) icon.textContent='❌';
    btn.style.opacity='1';
    btn.style.pointerEvents='auto';
    setTimeout(()=>{ if(icon) icon.textContent='🔄'; }, 2000);
  }
}

    (s.phone||'').includes(q);

  // 돌봄 학생 맵 (이름 → 교실)
  const daycareMap = {};
  for(const [room, list] of Object.entries(DAYCARE)){

  const classes = stuFilter==='전체' ? CLASS_LABELS : [stuFilter];

  let totalMain=0, totalDc=0;

  const html = classes.map(clsLabel=>{
    const grade = parseInt(clsLabel[0]);

    const gc = grade===1 ? 'var(--primary)' : 'var(--primary2)';
    const gcBg = grade===1 ? '#1F386420' : '#833C0020';

      s.clsKey===clsKey && matchQuery(s)
    );

    // 돌봄 전용 학생 (맞춤형에 없는 학생)
    const mainNames = new Set(STUDENTS.map(s=>s.name.trim()));
    const dcStudents = Object.entries(DAYCARE).flatMap(([room,list])=>
      list.filter(s=> s.cls===clsKey && matchQuery(s) && !mainNames.has(s.name))

    if(mainStudents.length===0 && dcStudents.length===0) return '';
    totalMain+=mainStudents.length;
    totalDc+=dcStudents.length;

    // 학번 기준 통합 정렬
    const allStudents = [
      ...mainStudents.map(s=>({...s, _daycare:false})),

        if(s._daycare){

          const dcPk = s.cls.replace('-','')+s.name;
          return `
          <div style="background:#FAF5FF;border-bottom:1px solid #EDE7F6;padding:10px 16px;
            display:flex;align-items:center;gap:10px;cursor:pointer;"
            onclick="daycareTab='${s.room}';goTo('daycare')">
            <div class="stu-avatar" data-pk="${dcPk}"
              style="width:36px;height:36px;border-radius:18px;background:${roomBg[s.room]};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:${roomColor[s.room]};flex-shrink:0;">${s.num}</div>
            <div style="flex:1;min-width:0;">
              <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
                <span style="font-size:12px;font-weight:700;color:${roomColor[s.room]};min-width:26px;">${s.num}번</span>
                <span onclick="openDaycareStudent('${s.cls}','${s.name}')" style="font-size:15px;font-weight:800;cursor:pointer;text-decoration:underline;text-underline-offset:2px;">${s.name}</span>

  }).join('');

  if(cnt) cnt.textContent = `맞춤형 ${totalMain}명 · 돌봄 ${totalDc}명`;
  el.innerHTML = html || `<div style="text-align:center;padding:40px;color:var(--muted)">검색 결과 없음</div>`;

// ── 학생 모달 ──
function openStuModal(id){
  const s = STUDENTS.find(x=>x.id===id);
  if(!s) return;
  const hc = s.grade===1 ? 'var(--primary)' : 'var(--primary2)';
  const sc = SCHEDULES[s.clsKey]||{};
  const dc = {월:"#4472C4",화:"#70AD47",수:"#ED7D31",목:"#9B59B6",금:"#C00000"};
  const nm = s.name.trim();
  const is2 = s.grade===2;

  // 개인 특수 일정: 노트 자동 파싱 + 수동 보완
  const SKIP_ALL_M   = new Set(["허산"]);
  const WED_JUSA_M   = new Set(["이연희"]);
  const sp = getStudentSpecial(nm, s.note);

  // 요일별 수강 현황 계산
  function getPersonalSubjs(day) {
    if(SKIP_ALL_M.has(nm)) return null;
    if(WED_JUSA_M.has(nm)) return day==='수' ? ['주산암산'] : null;
    if(sp?.skipDays?.includes(day)) return null;

    const daysc = sc[day]||[];
    const subjs = [];

    if(!is2) {
      // 1학년: replaceS1/S2 포함
      const s1raw = (sp?.replaceS1?.[day]) || daysc[0];
      const s2raw = (sp?.replaceS2?.[day]) || daysc[1];
      if(!sp?.skipS1Days?.includes(day) && s1raw && s1raw!=='—') subjs.push(s1raw);
      if(!sp?.skipS2Days?.includes(day) && s2raw) subjs.push(s2raw);
    } else {
      if(day==='월') {
        // s[0]="—" 건너뜀, s[1]=2교시, s[2]=3교시
        if(!sp?.skipS2Days?.includes(day) && daysc[1] && daysc[1]!=='—') subjs.push(daysc[1]);
        if(!sp?.skipS3Days?.includes(day) && daysc[2]) subjs.push(daysc[2]);
      } else if(day==='수') {
        const s1w = (sp?.replaceS1?.[day]) || (daysc[0]&&daysc[0]!=='—'?daysc[0]:null);
        const s2w = (sp?.replaceS2?.[day]) || daysc[1];
        if(!sp?.skipS1Days?.includes(day) && s1w) subjs.push(s1w);
        if(!sp?.skipS2Days?.includes(day) && s2w) subjs.push(s2w);
      } else {
        // 화·목·금
        const s1 = (sp?.replaceS1?.[day]) || (daysc[0]&&daysc[0]!=='—'?daysc[0]:null);
        const s2 = (sp?.replaceS2?.[day]) || daysc[1];
        if(!sp?.skipS1Days?.includes(day) && s1) subjs.push(s1);
        if(!sp?.skipS2Days?.includes(day) && s2) subjs.push(s2);
      }
    }
    return subjs.length>0 ? subjs : [];
  }

  document.getElementById('stu-modal-header').style.background = hc;
  const avatarEl = document.getElementById('stu-modal-avatar');
  const _mpk = s.clsKey.replace('-','')+s.name;
  avatarEl.textContent = s.num||'?';
  avatarEl.style.cssText = 'width:48px;height:48px;border-radius:24px;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;flex-shrink:0;';
  avatarEl.className = 'stu-avatar';
  avatarEl.dataset.pk = _mpk;
  // 모달 열린 후 줌 핸들러 등록
  requestAnimationFrame(()=>applyAvatarPhotos(document.getElementById('stu-modal')));
  document.getElementById('stu-modal-name').textContent = s.name;
  document.getElementById('stu-modal-cls').textContent = s.clsLabel;
  document.getElementById('stu-modal-phone').innerHTML = s.phone
    ? `<a href="tel:${s.phone}" style="background:rgba(255,255,255,0.15);border-radius:10px;padding:6px 12px;color:#fff;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px">📞 ${s.phone}</a>`
    : `<span style="color:rgba(255,255,255,0.5);font-size:12px">연락처 없음</span>`;

  document.getElementById('stu-modal-body').innerHTML = `
    ${s.note?`<div style="background:#FFF0F0;border-radius:12px;padding:14px;border:1.5px solid #FFCDD2;margin-bottom:10px">
      <div style="font-size:12px;font-weight:700;color:var(--danger);margin-bottom:6px">⚠ 특이사항</div>
      <div style="font-size:13px;color:var(--danger);line-height:20px;white-space:pre-line">${s.note}</div>
    </div>`:''}
    ${(()=>{
      // 이 학생이 관련된 사건 목록 (student 필드에 이름 포함)
      const related = INCIDENTS.filter(inc=>inc.student&&inc.student.includes(s.name.trim()));
      if(!related.length) return '';
      const tagColor={
        '⚠ 요주의':'#E65100','⚠ 민원':'#C62828','민원 1회':'#E65100',
        '⚠ 폭행사건':'#B71C1C','⚠ 안전사고':'#B71C1C','⚠ 조기하교':'#1565C0',
        '📋 출석관리':'#2E7D32','✅ 처리완료':'#388E3C','분실물 확인필요':'#6A1B9A'
      };
      return `<div style="background:#FFF8E1;border-radius:12px;padding:14px;border:1.5px solid #FFE082;margin-bottom:10px">
        <div style="font-size:12px;font-weight:700;color:#F57F17;margin-bottom:8px">📋 관련 특이사항 기록 (${related.length}건)</div>
        ${related.map(inc=>{
          const tc=tagColor[inc.tag]||'#555';
          return `<div style="background:#fff;border-radius:8px;padding:10px 12px;margin-bottom:6px;border-left:3px solid ${tc};">
            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px;">

              <span style="font-size:10px;color:var(--muted);">${inc.date} · ${inc.subject}</span>
            </div>
            <div style="font-size:12px;color:var(--text);line-height:1.6;white-space:pre-line;">${inc.content}</div>
            ${inc.action?`<div style="font-size:11px;color:#1565C0;margin-top:5px;font-weight:600;">→ ${inc.action}</div>`:''}
          </div>`;
        }).join('')}
      </div>`;
    })()}    <div style="background:#fff;border-radius:12px;padding:14px;border:1px solid var(--border)">
      <div style="font-size:13px;font-weight:700;color:var(--muted);margin-bottom:10px">📅 이번주 수강 현황 (${getThisWeekRange().label})</div>
      ${DAYS.map(day=>{
        const subjs = getPersonalSubjs(day);
        const isCancelled = subjs===null;
        const isEmpty = !isCancelled && subjs.length===0;

        // 슬롯 키 계산 (과목 팝업용)
        function getSlotKey(idx) {
          if(!is2) return idx===0?'s1':'s2';
          if(day==='수') return idx===0?'s1':'s2';
          if(day==='월') return idx===0?'s2':'s3'; // 2학년 월: s[1]=2교시,s[2]=3교시
          return idx===0?'s1':'s2';
        }

        return `<div style="display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
          <div style="width:28px;height:28px;border-radius:7px;background:${isCancelled?'#EEE':dc[day]+'20'};display:flex;align-items:center;justify-content:center;flex-shrink:0">
            <span style="font-weight:800;font-size:12px;color:${isCancelled?'#AAA':dc[day]}">${day}</span>
          </div>
          <div style="flex:1">
            <div style="font-size:10px;color:var(--muted);margin-bottom:3px">${day}요일 (${DAY_DATES[day]})</div>
            ${isCancelled
              ? `<span style="background:#FFCDD2;color:#B71C1C;border-radius:5px;padding:2px 7px;font-size:11px;font-weight:700">취소</span>`
              : isEmpty
                ? `<span style="color:var(--muted);font-size:12px">맞춤형 없음</span>`
                : subjs.map((subj,idx)=>`
                  <span onclick="closeStuModal();setTimeout(()=>showSubjDetail('${subj}','${day}','${getSlotKey(idx)}'),150)"
                    style="background:${gc(subj)}20;color:${gc(subj)};border-radius:6px;padding:3px 7px;font-size:11px;font-weight:700;border:1px solid ${gc(subj)}44;margin-right:4px;display:inline-block;margin-bottom:3px;cursor:pointer">
                    ${subj} 📍
                  </span>`).join('')
            }
          </div>
        </div>`;
      }).join('')}
    </div>
    <div style="height:20px"></div>
  `;

  document.getElementById('stu-modal').classList.remove('hidden');
}

function closeStuModal(){
  document.getElementById('stu-modal').classList.add('hidden');
}

// ── 출석부 ──
// ── 강좌별 출석부 뷰 ──
function renderCourseView(){
  const DAYS2=["월","화","수","목","금"];
  const DC={월:"#4472C4",화:"#70AD47",수:"#ED7D31",목:"#9B59B6",금:"#C00000"};

  // 전체 수업 목록 수집 (subj → sessions)
  const courseMap={};
  DAYS2.forEach(day=>{
    Object.entries(SCHEDULES).forEach(([k,sc])=>{
      const g=parseInt(k[0]),is2=g===2;
      const ds=sc[day]||[];
      ds.forEach((sv,i)=>{
        if(!sv||sv==='—') return;
        sv.split('+').forEach(p=>{
          p=p.trim();
          const slot=is2
            ?(day==='수'?(i===0?'s1':'s2'):day==='월'?(i===1?'s2':'s3'):(i===0?'s1':'s2'))
            :(day==='월'||day==='수'?(i===0?'s1':'s2'):(i===0?'s1':'s2'));
          const time={s1:day==='월'||day==='수'?'13:10~13:50':'13:50~14:30',
                      s2:day==='수'?'14:00~14:40':day==='월'?'14:00~14:40':'14:40~15:20',
                      s3:'14:40~15:20'}[slot]||'';
          if(!courseMap[p]) courseMap[p]={color:gc(p),sessions:[]};
          let sess=courseMap[p].sessions.find(x=>x.day===day&&x.slot===slot);
          if(!sess){sess={day,slot,time,classes:[]};courseMap[p].sessions.push(sess);}
          if(!sess.classes.includes(k)) sess.classes.push(k);
        });
      });
    });
  });

  const entries=Object.entries(courseMap).sort((a,b)=>{
    const ia=DAYS2.indexOf(a[1].sessions[0]?.day);
    const ib=DAYS2.indexOf(b[1].sessions[0]?.day);
    return ia-ib;
  });

  return `<div style="padding:10px;display:flex;flex-direction:column;gap:8px;">
    ${entries.map(([subj,{color,sessions}])=>{
      const instr=INSTRUCTOR_MAP[subj];
      const id='cv_'+subj.replace(/[^a-zA-Z0-9가-힣]/g,'_');
      return `<div style="background:#fff;border-radius:14px;overflow:hidden;
        box-shadow:0 1px 5px rgba(0,0,0,0.07);border-left:4px solid ${color};">
        <div onclick="document.getElementById('${id}').style.display=document.getElementById('${id}').style.display==='none'?'block':'none'"
          style="padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;">
          <div style="width:40px;height:40px;border-radius:10px;background:${color};
            display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;">
            ${EMOJI_MAP[subj]||'📚'}
          </div>
          <div style="flex:1;min-width:0;">
            <div style="font-size:15px;font-weight:900;color:${color};">${subj}</div>
            <div style="font-size:10px;color:var(--muted);margin-top:1px;">
              ${instr?`👤 ${instr.name} · `:''}📍 ${getPlaceByDay(subj, sessions[0]?.day||'', sessions[0]?.slot||'')}
            </div>
          </div>
          <span style="font-size:10px;color:var(--muted);flex-shrink:0;">▼ 탭하여 열기</span>
        </div>
        <div id="${id}" style="display:none;border-top:1px solid #F0F0F0;">
          ${sessions.sort((a,b)=>DAYS2.indexOf(a.day)-DAYS2.indexOf(b.day))
            .map(({day,slot,time,classes})=>{
              const dc2=DC[day]||'#555';
              const slotLabel=slot==='s1'?'맞춤형 1교시':slot==='s2'?'맞춤형 2교시':'맞춤형 3교시';
              return `<div onclick="currentDay='${day}';attViewMode='day';renderAttendance();setTimeout(()=>showSubjDetail('${subj}','${day}','${slot}'),50)"
                style="padding:11px 14px;display:flex;align-items:center;gap:10px;
                cursor:pointer;border-bottom:1px solid #F8F8F8;
                background:#FAFAFA;">
                <span style="background:${dc2};color:#fff;border-radius:6px;
                  padding:3px 9px;font-size:11px;font-weight:800;flex-shrink:0;">${day}요일</span>
                <div style="flex:1;min-width:0;">
                  <div style="font-size:12px;font-weight:700;color:#374151;">${slotLabel}</div>
                  <div style="font-size:10px;color:var(--muted);">🕐 ${time} · ${classes.join(' · ')}</div>
                </div>
                <span style="color:var(--muted);font-size:18px;">›</span>
              </div>`;
          }).join('')}
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

function renderAttendance(){
  // ── 세션 계산 (시간표 구조와 동일하게) ──
  // 1학년 월·수: s[0]=맞춤형1교시(13:10), s[1]=맞춤형2교시(14:00)
  // 1학년 화·목·금: s[0]=맞춤형1교시(13:50), s[1]=맞춤형2교시(14:40)
  // 2학년 수: s[0]=맞춤형1교시(13:10), s[1]=맞춤형2교시(14:00)
  // 2학년 월: s[1]=맞춤형2교시(14:00), s[2]=맞춤형3교시(14:40) — s[0]="—" 건너뜀
  // 2학년 화·목·금: s[0]=맞춤형1교시(13:50), s[1]=맞춤형2교시(14:40)

  const TIME_LABEL = {
    's1_1학년_월수': '맞춤형1교시 13:10~13:50',
    's1_1학년_화목금': '맞춤형1교시 13:50~14:30',
    's2_1학년_월수': '맞춤형2교시 14:00~14:40',
    's2_1학년_화목금': '맞춤형2교시 14:40~15:20',
    's1_2학년_수': '맞춤형1교시 13:10~13:50',
    's2_2학년_수': '맞춤형2교시 14:00~14:40',
    's2_2학년_월': '맞춤형2교시 14:00~14:40',
    's3_2학년_월': '맞춤형3교시 14:40~15:20',
    's1_2학년_화목금': '맞춤형1교시 13:50~14:30',
    's2_2학년_화목금': '맞춤형2교시 14:40~15:20',
  };

  // 세션별 순서 관리
  const sessionOrder = {};
  const sessions = {};

  function addToSession(subj, timeLabel, order, stu) {
    if(!subj || subj==='—') return;
    // 복합과목(+) 분리
    const parts = subj.includes('+') ? subj.split('+') : [subj];
    parts.forEach(p => {
      p = p.trim();
      const key = `${p}(${timeLabel})`;
      if(!sessions[key]) { sessions[key]=[]; sessionOrder[key]=order; }
      sessions[key].push(stu);
    });
  }

  // 1-4반 월요일 분반: 도자공예 vs 종이접기
  const DOZA_ONLY  = new Set(["김민우"]);
  const DOZA_S1    = new Set(["서가윤","신다혜","양희서","정나은","최아린"]);
  const SKIP_ALL   = new Set(["허산"]);
  const WED_JUSA_ONLY = new Set(["이연희"]);

  const d = currentDay;
  for(const [k,sc] of Object.entries(SCHEDULES)){
    const [g,cl] = k.split('-').map(Number);
    const dj = sc[d]; if(!dj) continue;
    const roster = STUDENTS.filter(s=>s.grade===g&&s.cls===cl);

    for(const stu of roster){
      const nm = stu.name.trim();

      if(SKIP_ALL.has(nm)) continue;

      if(WED_JUSA_ONLY.has(nm)) {
        if(d==='수') addToSession('주산암산', TIME_LABEL['s1_2학년_수'], 1, stu);
        continue;
      }

      // 노트에서 개인 특수 일정 계산
      const sp = getStudentSpecial(nm, stu.note);
      if(sp?.skipDays?.includes(d)) continue;
      if(g===1) {
        if(d==='월'||d==='수') {
          if(cl===4 && d==='월') {
            if(DOZA_ONLY.has(nm)) {
              addToSession('도자공예', TIME_LABEL['s1_1학년_월수'], 1, stu);
            } else if(DOZA_S1.has(nm)) {
              addToSession('도자공예', TIME_LABEL['s1_1학년_월수'], 1, stu);
              if(!sp?.skipS2Days?.includes(d)) addToSession(dj[1], TIME_LABEL['s2_1학년_월수'], 2, stu);
            } else {
              addToSession('종이접기', TIME_LABEL['s1_1학년_월수'], 1, stu);
              if(!sp?.skipS2Days?.includes(d)) addToSession(dj[1], TIME_LABEL['s2_1학년_월수'], 2, stu);
            }
          } else {
            if(!sp?.skipS1Days?.includes(d)) addToSession(dj[0], TIME_LABEL['s1_1학년_월수'], 1, stu);
            if(!sp?.skipS2Days?.includes(d)) addToSession(dj[1], TIME_LABEL['s2_1학년_월수'], 2, stu);
          }
        } else {
          const s1subj1 = (sp?.replaceS1?.[d]) || dj[0];
          const s2subj1 = (sp?.replaceS2?.[d]) || dj[1];
          if(!sp?.skipS1Days?.includes(d)) addToSession(s1subj1, TIME_LABEL['s1_1학년_화목금'], 1, stu);
          if(!sp?.skipS2Days?.includes(d)) addToSession(s2subj1, TIME_LABEL['s2_1학년_화목금'], 2, stu);
        }
      } else {
        if(d==='수') {
          const s1w = (sp?.replaceS1?.[d]) || dj[0];
          const s2w = (sp?.replaceS2?.[d]) || dj[1];
          if(!sp?.skipS1Days?.includes(d)) addToSession(s1w, TIME_LABEL['s1_2학년_수'], 1, stu);
          if(!sp?.skipS2Days?.includes(d)) addToSession(s2w, TIME_LABEL['s2_2학년_수'], 2, stu);
        } else if(d==='월') {
          if(!sp?.skipS2Days?.includes(d)) addToSession(dj[1], TIME_LABEL['s2_2학년_월'], 2, stu);
          if(!sp?.skipS3Days?.includes(d)) addToSession(dj[2], TIME_LABEL['s3_2학년_월'], 3, stu);
        } else {
          const s1subj = (sp?.replaceS1?.[d]) || dj[0];
          const s2subj = (sp?.replaceS2?.[d]) || dj[1];
          if(!sp?.skipS1Days?.includes(d)) addToSession(s1subj, TIME_LABEL['s1_2학년_화목금'], 1, stu);
          if(!sp?.skipS2Days?.includes(d)) addToSession(s2subj, TIME_LABEL['s2_2학년_화목금'], 2, stu);
        }
      }
    }
  }


  // 과목명 기준 정렬 → 같은 과목끼리 묶고 교시 순 정렬
  const sortedSessions = Object.entries(sessions).sort((a,b)=>{
    const subjA = a[0].split('(')[0], subjB = b[0].split('(')[0];
    if(subjA !== subjB) return subjA.localeCompare(subjB, 'ko');
    return (sessionOrder[a[0]]||9) - (sessionOrder[b[0]]||9);
  });
  const dc = {월:"#4472C4",화:"#70AD47",수:"#ED7D31",목:"#9B59B6",금:"#C00000"};

  document.getElementById('screen-attendance').innerHTML = `
    <div style="background:var(--primary);padding:20px;padding-top:calc(env(safe-area-inset-top,0px)+20px)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="color:#fff;font-size:20px;font-weight:800">출석부</div>
        <button onclick="resetAtt()" style="background:rgba(255,255,255,0.2);border:none;border-radius:8px;padding:5px 10px;color:#fff;font-size:11px;font-weight:700;cursor:pointer">🔄 초기화</button>
      </div>
      <div style="color:rgba(255,255,255,0.7);font-size:11px;margin-bottom:10px">${currentDay}요일(${DAY_DATES[currentDay]}) · 출석 체크 시 자동 저장</div>
      <div style="display:flex;gap:6px;">
        <button onclick="attViewMode='day';renderAttendance()"
          style="flex:1;padding:7px;border:none;border-radius:10px;cursor:pointer;font-size:12px;font-weight:700;
          background:${attViewMode==='day'?'rgba(255,255,255,0.95)':'rgba(255,255,255,0.15)'};
          color:${attViewMode==='day'?'var(--primary)':'#fff'};">📅 요일별</button>
        <button onclick="attViewMode='course';renderAttendance()"
          style="flex:1;padding:7px;border:none;border-radius:10px;cursor:pointer;font-size:12px;font-weight:700;
          background:${attViewMode==='course'?'rgba(255,255,255,0.95)':'rgba(255,255,255,0.15)'};
          color:${attViewMode==='course'?'var(--primary)':'#fff'};">📚 강좌별</button>
      </div>
    </div>
    ${attViewMode==='course'
      ? renderCourseView()
      : `<div class="day-tabs">
          ${DAYS.map(d=>`
            <button class="day-tab ${currentDay===d?'active':''}" onclick="currentDay='${d}';renderAttendance()" 
              style="border-bottom-color:${currentDay===d?dc[d]:'transparent'}">
              <div class="day" style="color:${currentDay===d?dc[d]:'var(--muted)'}">${d}</div>
              <div class="date">${DAY_DATES[d]}</div>
            </button>`).join('')}
        </div>`
    }
    <div style="padding:12px">
      ${sortedSessions.length===0 ? `<div style="text-align:center;padding:40px;color:var(--muted)">이 날은 맞춤형 수업이 없습니다.</div>` :
      sortedSessions.map(([session,stus])=>{
        const subj = session.split('(')[0];
        const color = gc(subj);
        const instr = INSTRUCTOR_MAP[subj];
        const stats = {present:0,absent:0,late:0,early:0,none:0};
        stus.forEach(s=>{
          const st = attData[`${session}|${s.id}`]||'';
          if(st==='present') stats.present++;
          else if(st==='absent') stats.absent++;
          else if(st==='late') stats.late++;
          else if(st==='early') stats.early++;
          else stats.none++;
        });
        return `
          <div class="session-card" style="margin-bottom:10px">
            <div class="session-header" style="background:${color}">
              <div style="display:flex;justify-content:space-between;align-items:center">
                <div style="display:flex;align-items:center;gap:8px;flex:1;flex-wrap:wrap">
                  <span style="color:#fff;font-weight:800;font-size:14px">${session}</span>
                  ${instr?`<button onclick="showInstrPopup('${subj}')" style="background:rgba(255,255,255,0.2);border:none;border-radius:10px;padding:2px 7px;color:#fff;font-size:10px;font-weight:600;cursor:pointer">👩‍🏫 ${instr.name}</button>`:''}
                </div>
                <div style="display:flex;gap:6px;align-items:center;flex-shrink:0">
                  <button onclick="markAllPresent('${session}',${JSON.stringify(stus.map(s=>s.id))})" 
                    style="background:rgba(255,255,255,0.25);border:none;border-radius:8px;padding:3px 8px;color:#fff;font-size:11px;font-weight:700;cursor:pointer">✓ 전원출석</button>
                  <span style="background:rgba(255,255,255,0.2);border-radius:10px;padding:2px 8px;color:#fff;font-size:12px;font-weight:700">${stus.length}명</span>
                </div>
              </div>
              ${stats.present+stats.absent+stats.late+stats.early>0?`
              <div style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap">
                ${stats.present>0?`<span style="background:rgba(255,255,255,0.25);border-radius:6px;padding:2px 6px;color:#fff;font-size:10px">✓ 출석 ${stats.present}</span>`:''}
                ${stats.absent>0?`<span style="background:rgba(255,100,100,0.4);border-radius:6px;padding:2px 6px;color:#fff;font-size:10px">✗ 결석 ${stats.absent}</span>`:''}
                ${stats.late>0?`<span style="background:rgba(255,200,0,0.35);border-radius:6px;padding:2px 6px;color:#fff;font-size:10px">▲ 지각 ${stats.late}</span>`:''}
                ${stats.early>0?`<span style="background:rgba(100,180,255,0.35);border-radius:6px;padding:2px 6px;color:#fff;font-size:10px">◀ 조기 ${stats.early}</span>`:''}
              </div>`:''}
            </div>
            ${stus.sort((a,b)=>a.grade!==b.grade?a.grade-b.grade:a.cls!==b.cls?a.cls-b.cls:a.num-b.num).map((s,i)=>{
              const dropKey=`${session}|${s.id}`;
              const status=attData[dropKey]||'';
              const stObj=ATT_STATUS.find(a=>a.key===status)||ATT_STATUS[0];
              const rowBg=status==='absent'?'#FFF5F5':status==='present'?'#F5FFF6':status==='late'?'#FFFBF0':status==='early'?'#F0F7FF':(i%2===0?'#fff':'#FAFAFA');
              return `
              <div>
                <div class="att-row" style="background:${rowBg}">
                  <div class="att-info" onclick="openStuModal('${s.id}')">
                    <span class="att-num">${s.num}</span>
                    <span class="att-name" style="color:${s.note?'var(--danger)':'var(--text)'}">${s.name}</span>
                    ${s.note?'<span style="font-size:12px">⚠</span>':''}
                    <span style="font-size:10px;color:var(--muted);margin-left:4px">${s.clsLabel}</span>
                  </div>
                  <button class="att-status-btn" onclick="toggleDrop('${dropKey}')" style="background:${stObj.bg}">

                    <span style="font-size:9px;color:${stObj.color}">${openDrop===dropKey?'▲':'▼'}</span>
                  </button>
                </div>
                ${openDrop===dropKey?`
                <div class="att-dropdown">
                  ${ATT_STATUS.map(opt=>`
                    <button class="att-opt" onclick="setAttStatus('${dropKey}',event)"
                      data-key="${opt.key}"
                      style="background:${status===opt.key?opt.color:opt.bg};border-color:${opt.color}${status===opt.key?'':'44'};color:${status===opt.key?'#fff':opt.color}">

                    </button>`).join('')}
                </div>`:''}
              </div>`;
            }).join('')}
          </div>`;
      }).join('')}
    </div>
  `;
}

function toggleDrop(key){
  openDrop = openDrop===key ? null : key;
  renderAttendance();
}

function setAttStatus(dropKey, e){
  const optKey = e.currentTarget.dataset.key;
  attData[dropKey] = optKey;
  saveAtt();
  openDrop = null;
  renderAttendance();
}

function markAllPresent(session, ids){
  ids.forEach(id=>{ attData[`${session}|${id}`]='present'; });
  saveAtt();
  renderAttendance();
}

function resetAtt(){
  if(!confirm('이 요일 출석 기록을 초기화할까요?')) return;
  Object.keys(attData).forEach(k=>{ delete attData[k]; });
  saveAtt();
  renderAttendance();
}

function getRoster(subj, day, clsKey) {
  if(!subj || subj==='—') return [];
  const roster = [];
  // 현재 반 학생 중 해당 요일 해당 과목 수업인 학생
  const [g,cl] = clsKey.split('-').map(Number);
  const sc = SCHEDULES[clsKey]||{};
  const daySubjs = sc[day]||[];
  if(!daySubjs.some(s=>s&&s.includes(subj))) return [];
  return STUDENTS.filter(s=>s.grade===g && s.cls===cl)
    .sort((a,b)=>a.num-b.num);
}

function getRosterAllClasses(subj, day, slot) {
  const DOZA_ONLY = new Set(["김민우"]);
  const DOZA_S1   = new Set(["서가윤","신다혜","양희서","정나은","최아린"]);
  const SKIP_ALL  = new Set(["허산"]);
  const WED_JUSA  = new Set(["이연희"]);
  const result = [];

  // 학년·요일·슬롯 → 기본 시간표 pos
  function getDefaultPos(grade, day, slot) {
    if(grade===1) return slot==='s1'?0:slot==='s2'?1:null;
    if(day==='수') return slot==='s1'?0:slot==='s2'?1:null;
    if(day==='월') return slot==='s1'?null:slot==='s2'?1:slot==='s3'?2:null;
    return slot==='s1'?0:slot==='s2'?1:null;
  }

  // 학생 개인 일정 기준으로 해당 슬롯의 실제 수업 반환
  function getPersonalSubj(stu, day, slot, defaultSubj) {
    const nm = stu.name.trim();
    const sp = getStudentSpecial(nm, stu.note);
    const is2 = stu.grade===2;

    if(sp?.skipDays?.includes(day)) return null;

    // WED_JUSA: 수요일 주산암산만
    if(WED_JUSA.has(nm)) return (day==='수'&&subj==='주산암산') ? '주산암산' : null;

    if(!is2) {
      // 1학년
      if(slot==='s1') {
        if(sp?.skipS1Days?.includes(day)) return null;
        return (sp?.replaceS1?.[day]) || defaultSubj;
      }
      if(slot==='s2') {
        if(sp?.skipS2Days?.includes(day)) return null;
        return (sp?.replaceS2?.[day]) || defaultSubj;
      }
      return null;
    } else {
      // 2학년
      if(day==='월') {
        if(slot==='s1') return null; // 정규
        if(slot==='s2') return sp?.skipS2Days?.includes(day) ? null : defaultSubj;
        if(slot==='s3') return sp?.skipS3Days?.includes(day) ? null : defaultSubj;
      } else if(day==='수') {
        if(slot==='s1') {
          if(sp?.skipS1Days?.includes(day)) return null;
          return (sp?.replaceS1?.[day]) || defaultSubj;
        }
        if(slot==='s2') {
          if(sp?.skipS2Days?.includes(day)) return null;
          return (sp?.replaceS2?.[day]) || defaultSubj;
        }
      } else {
        // 화·목·금
        if(slot==='s1') {
          if(sp?.skipS1Days?.includes(day)) return null;
          return (sp?.replaceS1?.[day]) || defaultSubj;
        }
        if(slot==='s2') {
          if(sp?.skipS2Days?.includes(day)) return null;
          return (sp?.replaceS2?.[day]) || defaultSubj;
        }
      }
    }
    return null;
  }

  for(const [clsKey, sc] of Object.entries(SCHEDULES)){
    const [g,cl] = clsKey.split('-').map(Number);
    const daySubjs = sc[day]||[];
    const pos = getDefaultPos(g, day, slot);
    if(pos===null) continue;
    const defaultSubjAtPos = daySubjs[pos]||'';

    const stus = STUDENTS.filter(s=>s.grade===g && s.cls===cl);
    for(const stu of stus){
      const nm = stu.name.trim();
      if(SKIP_ALL.has(nm)) continue;

      // WED_JUSA 처리
      if(WED_JUSA.has(nm)){
        if(day==='수'&&subj==='주산암산'&&slot==='s1') result.push(stu);
        continue;
      }

      // 1-4반 월요일 도자공예/종이접기 분반
      if(g===1&&cl===4&&day==='월'&&slot==='s1'){
        if(subj==='도자공예'){
          if(DOZA_ONLY.has(nm)||DOZA_S1.has(nm)) result.push(stu);
        } else if(subj==='종이접기'){
          if(!DOZA_ONLY.has(nm)&&!DOZA_S1.has(nm)) result.push(stu);
        }
        continue;
      }

      // 1-4반 월요일 2교시(칼라클레이): 김민우 제외
      if(g===1&&cl===4&&day==='월'&&slot==='s2'){
        if(DOZA_ONLY.has(nm)) continue;
      }

      // 개인 일정 기준으로 해당 슬롯 실제 수업 계산
      const actualSubj = getPersonalSubj(stu, day, slot, defaultSubjAtPos);
      if(!actualSubj) continue;
      // 실제 수업이 조회 대상 과목과 일치하는지
      if(actualSubj.includes(subj) || subj.includes(actualSubj)) result.push(stu);
      else if(subj==='창의과학' && !['주산암산'].includes(actualSubj) && defaultSubjAtPos==='창의과학') result.push(stu);
    }
  }
  return result.sort((a,b)=>a.grade!==b.grade?a.grade-b.grade:a.cls!==b.cls?a.cls-b.cls:a.num-b.num);
}

function ttCell(subj, day, slot) {
  if(!subj || subj==='—') return `<td style="padding:3px 2px;text-align:center"><div style="background:#F5F5F5;border-radius:6px;padding:6px 3px;font-size:8px;color:#CCC;min-height:32px;display:flex;align-items:center;justify-content:center">—</div></td>`;
  if(subj==='정규') return `<td style="padding:3px 2px;text-align:center"><div style="background:#F0F2F8;border-radius:6px;padding:6px 3px;font-size:8px;color:#8892A4;min-height:32px;display:flex;align-items:center;justify-content:center">정규수업</div></td>`;
  const parts = subj.includes('+') ? subj.split('+') : [subj];
  const cells = parts.map(p=>{
    p=p.trim();
    const color=gc(p);
    const place=getPlaceByDay(p,day,slot);
    return `<div class="subj-cell" onclick="showSubjDetail('${p}','${day}','${slot}')"
      style="background:${color}20;color:${color};border:1.5px solid ${color}66;border-radius:7px;padding:5px 3px;margin-bottom:2px;cursor:pointer;min-height:32px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px">
      <span style="font-weight:800;font-size:9px;text-align:center;line-height:1.2">${p}</span>
      ${place?`<span style="font-size:7px;opacity:0.75;text-align:center;line-height:1.2">${place.replace('\n',' ')}</span>`:''}
    </div>`;
  }).join('');
  return `<td style="padding:3px 2px;text-align:center">${cells}</td>`;
}

    (RESTRICTED[day]||[]).forEach(({room, reason, partial, time})=>{
      if(!busy[room]) busy[room]=[];
      busy[room].push({subj:(partial?'🟡 ':'🚫 ')+reason, time:time||(partial?'일부':'13:00~'), type:partial?'부분가능':'사용불가', partial});
    });
    // 맞춤형
    for(const [cls, sc] of Object.entries(SCHEDULES)){
      const grade=parseInt(cls[0]); const is2=grade===2;
      (sc[day]||[]).forEach((subj,i)=>{
        if(!subj||subj==='—') return;
        subj.split('+').forEach(s=>{
          s=s.trim();
          const place=(DAY_ROOM_OVERRIDE[day]&&DAY_ROOM_OVERRIDE[day][s]) || getPlace(s);
          if(place==='장소 미정') return;
          if(!busy[place]) busy[place]=[];
          let time='';
          if(!is2) time=(day==='월'||day==='수')?(i===0?'13:10~13:50':'14:00~14:40'):(i===0?'13:50~14:30':'14:40~15:20');
          else time=day==='수'?(i===0?'13:10~13:50':'14:00~14:40'):day==='월'?(i===1?'14:00~14:40':'14:40~15:20'):(i===0?'13:50~14:30':'14:40~15:20');
          busy[place].push({subj:s, time, type:'맞춤형'});
        });
      });
    }
    // 방과후
    AFTER_SCHOOL.filter(p=>p.days.includes(day)).forEach(p=>{
      p.place.split('/').map(x=>x.trim()).forEach(place=>{
        if(!busy[place]) busy[place]=[];
        if(p.timeA) busy[place].push({subj:p.name.replace('컴퓨터(','').replace(')',''), time:p.timeA, type:'방과후 A반'});
        if(p.timeB) busy[place].push({subj:p.name.replace('컴퓨터(','').replace(')',''), time:p.timeB, type:'방과후 B반'});
      });
    });
    return busy;
  }

  const dayNames=["일","월","화","수","목","금","토"];
  const todayDow=new Date().getDay();
  const initDay=DAYS.includes(dayNames[todayDow])?dayNames[todayDow]:"월";

  function buildContent(day){
    const busy=getBusyRooms(day);
    const partialRooms=[...allRooms].filter(r=>busy[r]&&busy[r].some(e=>e.partial)).sort();
    const idleRooms=[...allRooms].filter(r=>!busy[r]).sort();
    const busyRooms=[...allRooms].filter(r=>busy[r]&&!busy[r].some(e=>e.partial)).sort();
    return `
      <!-- 유휴 교실 -->
      <div style="margin-bottom:14px;">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;">
          <span style="background:#D1FAE5;color:#065F46;border-radius:6px;padding:2px 10px;font-size:11px;font-weight:800;">✅ 유휴교실 ${idleRooms.length}개</span>
        </div>
        ${idleRooms.length?idleRooms.map(r=>`
          <div onclick="closePopup();setTimeout(()=>showRoomSearchFor('${r}'),200)"
            style="background:#fff;border:1.5px solid #6EE7B7;border-radius:10px;padding:11px 14px;margin-bottom:6px;
            display:flex;align-items:center;gap:10px;cursor:pointer;">
            <span style="font-size:18px;">🏫</span>
            <span style="font-size:13px;font-weight:800;color:#065F46;flex:1;">${r}</span>
            <span style="font-size:11px;color:#aaa;">탭 → 수업검색</span>
          </div>`).join('')
        :`<div style="text-align:center;padding:16px;background:#fff;border-radius:10px;color:#9CA3AF;font-size:12px;">모든 교실 사용 중입니다</div>`}
      </div>
      <!-- 부분 가능 교실 -->
      ${partialRooms.length?`<div style="margin-bottom:14px;">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;">
          <span style="background:#FEF3C7;color:#92400E;border-radius:6px;padding:2px 10px;font-size:11px;font-weight:800;">🟡 부분 사용 가능 ${partialRooms.length}개</span>
        </div>
        ${partialRooms.map(r=>{
          const info = busy[r].find(e=>e.partial);
          return `<div onclick="closePopup();setTimeout(()=>showRoomSearchFor('${r}'),200)"
            style="background:#FFFBEB;border:1.5px solid #FCD34D;border-radius:10px;padding:11px 14px;margin-bottom:6px;cursor:pointer;">
            <div style="display:flex;align-items:center;gap:10px;">
              <span style="font-size:18px;">🟡</span>
              <div style="flex:1;">
                <div style="font-size:13px;font-weight:800;color:#92400E;">${r}</div>
                <div style="font-size:11px;color:#B45309;margin-top:2px;">${info?.subj||''}</div>
              </div>
              <span style="font-size:11px;color:#aaa;">탭 → 수업검색</span>
            </div>
          </div>`;
        }).join('')}
      </div>`:''}
      <!-- 사용 중 교실 -->
      <div>
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;">
          <span style="background:#FEE2E2;color:#991B1B;border-radius:6px;padding:2px 10px;font-size:11px;font-weight:800;">🔴 사용 중 ${busyRooms.length}개</span>
        </div>
        ${busyRooms.map(r=>{
          const entries=[...new Map(busy[r].map(e=>[e.time+e.subj,e])).values()].sort((a,b)=>a.time.localeCompare(b.time));
          const isRestricted = entries.some(e=>e.type==='사용불가');
          const borderColor = isRestricted ? '#FCD34D' : '#FECACA';
          const bgColor = isRestricted ? '#FFFBEB' : '#fff';
          const titleColor = isRestricted ? '#92400E' : '#991B1B';
          return `<div style="background:${bgColor};border:1.5px solid ${borderColor};border-radius:10px;padding:11px 14px;margin-bottom:6px;">
            <div style="font-size:12px;font-weight:800;color:${titleColor};margin-bottom:5px;">${isRestricted?'⚠️':'📍'} ${r}</div>
            ${entries.map(e=>`
              <div style="display:flex;align-items:center;gap:8px;padding:3px 0;border-bottom:1px solid ${isRestricted?'#FEF3C7':'#FEF2F2'};">
                <span style="font-size:10px;color:#6B7280;min-width:86px;">${e.time}</span>
                <span style="font-size:11px;font-weight:700;color:#374151;">${e.subj}</span>
                <span style="font-size:9px;background:${e.type==='사용불가'?'#FEF3C7':e.type.includes('방과후')?'#DBEAFE':'#EDE9FE'};color:${e.type==='사용불가'?'#92400E':e.type.includes('방과후')?'#1E40AF':'#5B21B6'};border-radius:4px;padding:1px 5px;">${e.type}</span>
              </div>`).join('')}
          </div>`;
        }).join('')}
      </div>`;
  }

  function dayTabsHTML(day){
    return DAYS.map(d=>`
      <button onclick="switchIdleDay('${d}')"
        style="flex:1;padding:6px 2px;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;
          background:${d===day?'#fff':'rgba(255,255,255,0.15)'};
          color:${d===day?'#C2410C':'rgba(255,255,255,0.85)'};">${d}</button>`).join('');
  }

  showPopup(`
    <div style="background:linear-gradient(135deg,#C2410C,#EA580C);padding:16px 18px 14px;border-radius:18px 18px 0 0;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <div>
          <div style="color:#fff;font-size:17px;font-weight:900;">🔍 유휴교실 찾기 마법사</div>
          <div style="color:rgba(255,255,255,0.75);font-size:11px;margin-top:2px;">빈 교실과 사용 중인 교실을 확인합니다</div>
        </div>
        <button onclick="closePopup()" style="background:rgba(255,255,255,0.2);border:none;border-radius:20px;width:32px;height:32px;color:#fff;font-size:15px;cursor:pointer;">✕</button>
      </div>
      <div id="idle-day-tabs" style="display:flex;gap:5px;">${dayTabsHTML(initDay)}</div>
    </div>
    <div id="idle-body" style="padding:12px;max-height:60vh;overflow-y:auto;background:#F8F9FA;">
      ${buildContent(initDay)}
    </div>
  `);

  window.switchIdleDay=(day)=>{
    document.getElementById('idle-day-tabs').innerHTML=dayTabsHTML(day);
    document.getElementById('idle-body').innerHTML=buildContent(day);
  };
}

function showRoomSearch(){
  // 맞춤형: PLACE_MAP_WEB 기반
  const roomMap = {};
  const afterSchoolNames = new Set(AFTER_SCHOOL.map(p=>p.name));
  for(const [subj, place] of Object.entries(PLACE_MAP_WEB)){
    if(!roomMap[place]) roomMap[place]=[];
    // 방과후에도 같은 수업명이 있으면 항상 "(맞춤형)" 구분
    const label = afterSchoolNames.has(subj) ? subj+'(맞춤형)' : subj;
    if(!roomMap[place].includes(label)) roomMap[place].push(label);
  }
  // 방과후: AFTER_SCHOOL 기반
  AFTER_SCHOOL.forEach(p=>{
    const places = p.place.split('/').map(x=>x.trim());
    places.forEach(place=>{
      if(!roomMap[place]) roomMap[place]=[];
      // 맞춤형에도 같은 수업명이 있으면 항상 "(방과후)" 구분
      const label = PLACE_MAP_WEB[p.name] ? p.name+'(방과후)' : p.name;
      if(!roomMap[place].includes(label)) roomMap[place].push(label);
    });
  });
  const rooms = Object.keys(roomMap).sort();

  // 각 수업의 시간표 정보 수집
  function getSubjSchedule(subj){
    // "(맞춤형)" "(방과후)" 접미사 제거 후 실제 수업명으로 조회
    const isCust = subj.endsWith('(맞춤형)');
    const isAfter = subj.endsWith('(방과후)');
    const realSubj = subj.replace(/\(맞춤형\)|\(방과후\)$/,'');
    const slots = [];
    // 방과후 전용이 아닌 경우 SCHEDULES 조회
    if(!isAfter){
      for(const day of DAYS){
        for(const cls of Object.keys(SCHEDULES)){
          const dj = SCHEDULES[cls][day]||[];
          dj.forEach((s,i)=>{
            if(s && s.includes(realSubj)){
              const grade = parseInt(cls[0]);
              const is2 = grade===2;
              let time='';
              if(!is2){
                if(day==='월'||day==='수') time=i===0?'13:10~13:50':'14:00~14:40';
                else time=i===0?'13:50~14:30':'14:40~15:20';
              } else {
                if(day==='수') time=i===0?'13:10~13:50':'14:00~14:40';
                else if(day==='월') time=i===1?'14:00~14:40':'14:40~15:20';
                else time=i===0?'13:50~14:30':'14:40~15:20';
              }
              slots.push({day, cls, time});
            }
          });
        }
      }
    }
    // 맞춤형 전용이 아닌 경우 AFTER_SCHOOL 조회
    if(!isCust){
      const asEntry = AFTER_SCHOOL.find(p=>p.name===realSubj);
      if(asEntry){
        asEntry.days.forEach(day=>{
          if(asEntry.timeA) slots.push({day, cls:'A반', time:asEntry.timeA});
          if(asEntry.timeB) slots.push({day, cls:'B반', time:asEntry.timeB});
        });
      }
    }
    return slots;
  }

  // EMOJI_MAP은 전역 상수 사용
  function getEmoji(s){ return EMOJI_MAP[s]||'📚'; }
  const SUB_COLORS = {음악줄넘기:'#1F3864',놀이체육:'#1F3864','축구(풋살)':'#1F3864',
    뉴스포츠:'#215868',오카리나:'#7030A0',종이접기:'#7030A0',그림책놀이:'#7030A0',
    책놀이:'#7030A0',우쿨렐레:'#7030A0',방송댄스:'#C00000',주산암산:'#833C00',
    토탈공예:'#833C00',창의미술:'#843C0C',칼라클레이:'#843C0C',도자공예:'#7B2C00',
    창의과학:'#17375E',중국어:'#17375E',보드게임:'#4B2A94',영어회화:'#375623',
    영어야놀자:'#375623',전래놀이:'#C00000',로봇과학:'#FF6B35',컴퓨터:'#2C6BB5',
  };
  function gc(subj){ for(const[k,v] of Object.entries(SUB_COLORS)) if(subj.includes(k)) return v; return '#555'; }

  function buildRoomContent(room){
    const subjs = roomMap[room]||[];
    if(!subjs.length) return '<div style="padding:20px;text-align:center;color:#aaa;">수업 없음</div>';
    const dayOrder = {월:0,화:1,수:2,목:3,금:4};

    // 수업 카드를 첫 번째 요일·시간 기준으로 정렬
    const subjsWithSlots = subjs.map(subj=>{
      const slots = getSubjSchedule(subj);
      slots.sort((a,b)=>(dayOrder[a.day]||0)-(dayOrder[b.day]||0)||(a.time<b.time?-1:1));
      const firstSlot = slots[0];
      return { subj, slots, firstDay: firstSlot?dayOrder[firstSlot.day]??99:99, firstTime: firstSlot?.time||'zzz' };
    });
    subjsWithSlots.sort((a,b)=>a.firstDay-b.firstDay||(a.firstTime<b.firstTime?-1:1));

    return subjsWithSlots.map(({subj, slots})=>{
      const realSubj = subj.replace(/\(맞춤형\)|\(방과후\)$/,'');
      const color = gc(realSubj);
      const instr = INSTRUCTOR_MAP[realSubj];
      slots.sort((a,b)=>(dayOrder[a.day]||0)-(dayOrder[b.day]||0)||(a.time<b.time?-1:1));
      const dayGroups = {};
      slots.forEach(s=>{ if(!dayGroups[s.day]) dayGroups[s.day]=[]; dayGroups[s.day].push(s.cls+' '+s.time); });
      const sortedDays = Object.keys(dayGroups).sort((a,b)=>(dayOrder[a]||0)-(dayOrder[b]||0));
      return `
      <div style="background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:10px;
        border-left:4px solid ${color};box-shadow:0 1px 4px rgba(0,0,0,0.07);">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
          <span style="font-size:16px;">${getEmoji(realSubj)}</span>
          <span style="font-size:15px;font-weight:900;color:${color};">${realSubj}</span>
          ${subj.includes('(방과후)')?programBadge('컴퓨터'):subj.includes('(맞춤형)')?programBadge('발레'):programBadge(realSubj)}
          ${instr?`<span style="font-size:11px;color:#888;margin-left:auto;">👤 ${instr.name}</span>`:''}
        </div>
        ${sortedDays.length?`
        <div style="display:flex;flex-wrap:wrap;gap:5px;">
          ${sortedDays.map(day=>{
            const times=[...new Set(dayGroups[day].map(t=>t.split(' ')[1]))].sort();
            return `<div style="background:${color}0F;border:1px solid ${color}33;border-radius:8px;padding:4px 10px;">
            <span style="font-size:11px;font-weight:800;color:${color};">${day}요일</span>
            <div style="font-size:10px;color:#666;margin-top:1px;">${times.join(' / ')}</div>
          </div>`;}).join('')}
        </div>`:'<div style="font-size:11px;color:#aaa;">시간표 미배정</div>'}
      </div>`;
    }).join('');
  }

  function roomTabsHTML(room){
    return rooms.map(r=>`
      <button onclick="switchRoom('${r.replace(/'/g,"\\'")}')"
        style="padding:8px 10px;border:1.5px solid ${r===room?'#1F3864':'#e0e0e0'};
          border-radius:10px;background:${r===room?'#1F3864':'#fff'};
          color:${r===room?'#fff':'#374151'};font-size:11px;font-weight:700;
          cursor:pointer;text-align:left;line-height:1.4;">
        ${r}
      </button>`).join('');
  }

  const initRoom = rooms[0]||'';
  showPopup(`
    <div style="background:linear-gradient(135deg,#1F3864,#2C5282);padding:16px 18px 14px;border-radius:18px 18px 0 0;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <div>
          <div style="color:#fff;font-size:17px;font-weight:900;">🏫 교실별 수업 검색</div>
          <div style="color:rgba(255,255,255,0.75);font-size:11px;margin-top:2px;">수업명 또는 교실명으로 검색</div>
        </div>
        <button onclick="closePopup()" style="background:rgba(255,255,255,0.2);border:none;border-radius:20px;width:32px;height:32px;color:#fff;font-size:15px;cursor:pointer;">✕</button>
      </div>
      <!-- 검색창 -->
      <div style="position:relative;margin-bottom:10px;">
        <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;">🔍</span>
        <input id="room-search-input" type="text" placeholder="수업명 또는 교실 검색…"
          oninput="filterRoomSearch(this.value)"
          autocomplete="off" autocorrect="off" autocapitalize="off"
          style="width:100%;box-sizing:border-box;padding:9px 12px 9px 32px;border:none;border-radius:10px;
            font-size:13px;outline:none;background:rgba(255,255,255,0.95);">
      </div>
      <!-- 교실 칩 스크롤 -->
      <div id="room-tabs" style="display:grid;grid-template-columns:repeat(2,1fr);gap:6px;padding-bottom:4px;">
        ${roomTabsHTML(initRoom)}
      </div>
    </div>
    <div id="room-body" style="padding:12px;max-height:52vh;overflow-y:auto;background:#F8F9FA;">
      ${buildRoomContent(initRoom)}
    </div>
  `);

  window.switchRoom=(room)=>{
    document.getElementById('room-tabs').innerHTML=roomTabsHTML(room);
    document.getElementById('room-body').innerHTML=buildRoomContent(room);
    // 결과 영역으로 부드럽게 스크롤
    document.getElementById('room-body').scrollIntoView({behavior:'smooth', block:'start'});
  };

  // 수업명/교실명 통합 검색
  window.filterRoomSearch=(q)=>{
    q = q.trim();
    if(!q){
      // 검색어 없으면 교실 탭 모드 복원
      document.getElementById('room-tabs').style.display='flex';
      document.getElementById('room-tabs').innerHTML=roomTabsHTML(initRoom);
      document.getElementById('room-body').innerHTML=buildRoomContent(initRoom);
      return;
    }
    document.getElementById('room-tabs').style.display='none';
    // 수업명 or 교실명 검색
    const matched = [];
    for(const [room, subjs] of Object.entries(roomMap)){
      for(const subj of subjs){
        if(subj.includes(q) || room.includes(q)){
          if(!matched.find(m=>m.subj===subj)) matched.push({subj,room});
        }
      }
    }
    // 강사명 검색
    for(const [subj, info] of Object.entries(INSTRUCTOR_MAP)){
      if(info.name && info.name.includes(q)){
        const room = PLACE_MAP_WEB[subj]||'장소 미정';
        if(!matched.find(m=>m.subj===subj)) matched.push({subj,room});
      }
    }
    if(!matched.length){
      document.getElementById('room-body').innerHTML='<div style="text-align:center;padding:30px;color:#aaa;font-size:13px;">검색 결과 없음</div>';
      return;
    }
    document.getElementById('room-body').innerHTML = matched.sort((a,b)=>{
      const dayOrder2={월:0,화:1,수:2,목:3,금:4};
      const sa=getSubjSchedule(a.subj); const sb=getSubjSchedule(b.subj);
      sa.sort((x,y)=>(dayOrder2[x.day]||0)-(dayOrder2[y.day]||0)||(x.time<y.time?-1:1));
      sb.sort((x,y)=>(dayOrder2[x.day]||0)-(dayOrder2[y.day]||0)||(x.time<y.time?-1:1));
      const da=sa[0]?dayOrder2[sa[0].day]??99:99, db=sb[0]?dayOrder2[sb[0].day]??99:99;
      const ta=sa[0]?.time||'zzz', tb=sb[0]?.time||'zzz';
      return da-db||(ta<tb?-1:1);
    }).map(({subj,room})=>{
      const color=gc(subj);
      const instr=INSTRUCTOR_MAP[subj];
      const slots=getSubjSchedule(subj);
      const dayGroups={};
      const dayOrder2={월:0,화:1,수:2,목:3,금:4};
      slots.sort((a,b)=>(dayOrder2[a.day]||0)-(dayOrder2[b.day]||0)||(a.time<b.time?-1:1));
      slots.forEach(s=>{if(!dayGroups[s.day])dayGroups[s.day]=[];dayGroups[s.day].push(s.cls+' '+s.time);});
      const sortedDays2=Object.keys(dayGroups).sort((a,b)=>(dayOrder2[a]||0)-(dayOrder2[b]||0));
      return `<div style="background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:10px;border-left:4px solid ${color};box-shadow:0 1px 4px rgba(0,0,0,0.07);">
        <div style="font-size:10px;color:#aaa;margin-bottom:6px;">📍 ${room}</div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
          <span style="font-size:16px;">${getEmoji(subj)}</span>
          <span style="font-size:15px;font-weight:900;color:${color};">${subj}</span>
          ${instr?`<span style="font-size:11px;color:#888;margin-left:auto;">👤 ${instr.name}</span>`:''}
        </div>

function downloadTimetableXlsx(clsOnly){
  const wr = getThisWeekRange();
  const clsList = clsOnly
    ? [currentTTClass]
    : CLASS_LABELS.map(cl=>`${cl[0]}-${cl[4]}`);

  const wb = XLSX.utils.book_new();

  const SUBJ_COLORS = {
    발레:'1F3864',음악줄넘기:'1F3864',놀이체육:'1F3864','축구(풋살)':'1F3864',뉴스포츠:'215868',
    오카리나:'7030A0',종이접기:'7030A0',그림책놀이:'7030A0',책놀이:'7030A0',우쿨렐레:'7030A0',
    방송댄스:'C00000',주산암산:'833C00',토탈공예:'833C00',창의미술:'843C0C',칼라클레이:'843C0C',
    도자공예:'7B2C00',창의과학:'17375E',중국어:'17375E',보드게임:'4B2A94',
    영어회화:'375623',영어야놀자:'375623',전래놀이:'C00000',
    로봇과학:'FF6B35',로봇과학A:'FF6B35',로봇과학B:'E55A00',컴퓨터:'2C6BB5',
  };
  function getColor(subj){ if(!subj) return '555555'; for(const[k,v] of Object.entries(SUBJ_COLORS)) if(subj.includes(k)) return v; return '555555'; }
  function getPlace(subj){ return PLACE_MAP_WEB?.[subj]||''; }

  for(const cls of clsList){
    const sc=SCHEDULES[cls]||{};
    const grade=parseInt(cls[0]);
    const is2=grade===2;
    const gradeLabel=`${grade}학년 ${cls[2]}반`;

    function getSubj(day, slotIdx){
      const dj=sc[day]||[];
      if(!is2){ if(day==='월'||day==='수') return dj[slotIdx]; else return slotIdx===0?null:dj[slotIdx-1]; }
      else { if(day==='수') return dj[slotIdx]; else if(day==='월') return slotIdx===0?null:dj[slotIdx]; else return slotIdx===0?null:dj[slotIdx-1]; }
    }

    const slotLabels = !is2
      ?['맞춤형 1교시\n(월·수 13:10~13:50 / 화·목·금 13:50~14:30)','맞춤형 2교시\n(월·수 14:00~14:40 / 화·목·금 14:40~15:20)']
      :['맞춤형 1교시\n(수 13:10~13:50 / 화·목·금 13:50~14:30)','맞춤형 2교시\n(월·수 14:00~14:40 / 화·목·금 14:40~15:20)','맞춤형 3교시\n(월 14:40~15:20)'];

    // 행 구성
    const rows=[];
    // 헤더
    rows.push([gradeLabel+' 맞춤형 시간표','월 '+DAY_DATES['월'],'화 '+DAY_DATES['화'],'수 '+DAY_DATES['수'],'목 '+DAY_DATES['목'],'금 '+DAY_DATES['금']]);
    rows.push(['기간: '+wr.mon+'(월) ~ '+wr.fri+'(금)','','','','','']);
    rows.push(['정규수업 (1~4교시)','정규수업','정규수업','정규수업','정규수업','정규수업']);
    rows.push(['점심 🍱 11:30','점심','점심','점심','점심','점심']);
    for(let i=0;i<slotLabels.length;i++){
      const row=[slotLabels[i]];
      for(const day of DAYS){
        const subj=getSubj(day,i);
        if(!subj||subj==='—'){ row.push((!is2&&(day!=='월'&&day!=='수')&&i===0)||(is2&&day!=='수'&&i===0)?'정규수업':'—'); }
        else { const pl=getPlace(subj); row.push(subj+(pl?' ('+pl+')':'')); }
      }
      rows.push(row);
    }
    rows.push(['하교',...DAYS.map(d=>(!is2&&(d==='월'||d==='수'))||(is2&&d==='수')?'14:40 하교':'15:20 하교')]);

    const ws=XLSX.utils.aoa_to_sheet(rows);

    // 열 너비
    ws['!cols']=[{wch:32},{wch:18},{wch:18},{wch:18},{wch:18},{wch:18}];
    // 행 높이
    ws['!rows']=rows.map((_,i)=>({hpt: i<2?20:i>=4&&i<4+slotLabels.length?48:20}));

    XLSX.utils.book_append_sheet(wb, ws, gradeLabel);
  }

  const fname=clsOnly
    ? `정라초_${currentTTClass}반_시간표_${wr.mon.replace('/','')}-${wr.fri.replace('/','')}.xlsx`
    : `정라초_전체반_시간표_${wr.mon.replace('/','')}-${wr.fri.replace('/','')}.xlsx`;
  XLSX.writeFile(wb, fname);
}

      if(d==='월'||d==='수') tlabel = slot==='s1'?'맞춤형1교시 13:10~13:50':'맞춤형2교시 14:00~14:40';
      else tlabel = slot==='s1'?'맞춤형1교시 13:50~14:30':'맞춤형2교시 14:40~15:20';
    } else {
      if(d==='수') tlabel = slot==='s1'?'맞춤형1교시 13:10~13:50':'맞춤형2교시 14:00~14:40';
      else if(d==='월') tlabel = slot==='s1'?'맞춤형2교시 14:00~14:40':'맞춤형3교시 14:40~15:20';
      else tlabel = slot==='s1'?'맞춤형1교시 13:50~14:30':'맞춤형2교시 14:40~15:20';
    }
    return `${subj}(${tlabel})|${stu.id}`;
  }

  // 출석 통계
  const stats = {present:0,absent:0,late:0,early:0,none:0};
  roster.forEach(s=>{
    const st = attData[getAttKey(s)]||'';
    if(st==='present') stats.present++;
    else if(st==='absent') stats.absent++;
    else if(st==='late') stats.late++;
    else if(st==='early') stats.early++;
    else stats.none++;
  });

  const ATT_BADGE = {
    present: {icon:'✓', color:'#2E7D32', bg:'#E8F5E9', label:'출석'},
    absent:  {icon:'✗', color:'#C62828', bg:'#FFEBEE', label:'결석'},
    late:    {icon:'▲', color:'#E65100', bg:'#FFF3E0', label:'지각'},
    early:   {icon:'◀', color:'#1565C0', bg:'#E3F2FD', label:'조기'},
    '':      {icon:'○', color:'#CCC',    bg:'#F5F5F5', label:'미체크'},
  };

  showPopup(`
    <div style="background:${color};padding:16px 16px 14px;border-radius:18px 18px 0 0">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div>
          <div style="display:flex;align-items:center;gap:7px;margin-bottom:2px;">
            <div style="color:#fff;font-size:18px;font-weight:900">${subj}</div>
            ${programBadge(subj).replace('font-size:9px','font-size:10px')}
          </div>
          <div style="color:rgba(255,255,255,0.85);font-size:12px;margin-top:2px">${day}요일 (${DAY_DATES[day]}) · ${slotLabel}</div>
        </div>
        <button onclick="closePopup()" style="background:rgba(255,255,255,0.2);border:none;border-radius:20px;width:32px;height:32px;color:#fff;font-size:15px;cursor:pointer">✕</button>
      </div>
      <!-- 출석 통계 -->
      ${roster.length>0?`<div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
        ${stats.present>0?`<span style="background:rgba(255,255,255,0.25);border-radius:6px;padding:2px 7px;color:#fff;font-size:10px;font-weight:700">✓ 출석 ${stats.present}</span>`:''}
        ${stats.absent>0?`<span style="background:rgba(200,50,50,0.4);border-radius:6px;padding:2px 7px;color:#fff;font-size:10px;font-weight:700">✗ 결석 ${stats.absent}</span>`:''}
        ${stats.late>0?`<span style="background:rgba(255,200,0,0.35);border-radius:6px;padding:2px 7px;color:#fff;font-size:10px;font-weight:700">▲ 지각 ${stats.late}</span>`:''}
        ${stats.early>0?`<span style="background:rgba(100,180,255,0.35);border-radius:6px;padding:2px 7px;color:#fff;font-size:10px;font-weight:700">◀ 조기 ${stats.early}</span>`:''}
        ${stats.none>0?`<span style="background:rgba(255,255,255,0.15);border-radius:6px;padding:2px 7px;color:rgba(255,255,255,0.8);font-size:10px">○ 미체크 ${stats.none}</span>`:''}
      </div>`:''}
    </div>
    <div style="padding:14px;display:flex;flex-direction:column;gap:10px">
      <!-- 장소 -->
      <div style="background:${color}10;border-radius:12px;padding:12px;border-left:4px solid ${color}">
        <div style="font-size:11px;color:var(--muted);font-weight:700;margin-bottom:4px">📍 수업 장소</div>
        <div style="font-size:15px;font-weight:800;color:var(--text)">${place}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">🕐 ${timeMap[slot]||''}</div>
      </div>
      <!-- 강사 -->
      ${instr ? `
      <div style="background:#fff;border-radius:12px;padding:12px;border:1px solid var(--border)">
        <div style="font-size:11px;color:var(--muted);font-weight:700;margin-bottom:8px">👩‍🏫 담당 강사</div>
        <div style="display:flex;align-items:center;justify-content:space-between">
          <span style="font-size:16px;font-weight:800">${instr.name} 강사</span>
          <a href="tel:${instr.phone}" style="background:${color};color:#fff;border-radius:10px;padding:7px 12px;font-size:12px;font-weight:700;text-decoration:none">📞 ${instr.phone}</a>
        </div>
      </div>` : `
      <div style="background:#F5F5F5;border-radius:12px;padding:12px;text-align:center;color:var(--muted);font-size:13px">강사 정보 없음</div>`}
      <!-- 수강자 명단 + 출석 현황 -->
      <div style="background:#fff;border-radius:12px;padding:12px;border:1px solid var(--border)">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <div style="font-size:11px;color:var(--muted);font-weight:700">👥 수강 학생 · 출석 현황</div>
          <div style="background:${color};border-radius:10px;padding:2px 8px;font-size:11px;color:#fff;font-weight:700">${roster.length}명</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px">
          ${roster.length>0 ? roster.map(s=>{
            const status = attData[getAttKey(s)]||'';
            const badge = ATT_BADGE[status]||ATT_BADGE[''];
            return `<div onclick="closePopup();setTimeout(()=>openStuModal('${s.id}'),100)"
              style="display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;background:${badge.bg};border:1px solid ${badge.color}22;cursor:pointer">
              <span style="font-size:9px;color:${s.grade===1?'var(--primary)':'var(--primary2)'};font-weight:700;min-width:20px">${s.grade}-${s.cls}</span>
              <span style="font-size:13px;font-weight:800;flex:1">${s.name}</span>
              ${s.note?'<span style="font-size:10px;color:var(--danger)">⚠</span>':''}
              <span style="background:${badge.color};color:#fff;border-radius:6px;padding:2px 6px;font-size:10px;font-weight:700;min-width:36px;text-align:center">${badge.icon} ${badge.label}</span>
            </div>`;
          }).join('') : '<div style="color:var(--muted);font-size:13px;width:100%;text-align:center">수강 학생 없음</div>'}
        </div>
      </div>
      <button onclick="closePopup()" style="width:100%;background:#f0f0f0;border:none;border-radius:10px;padding:11px;font-size:14px;font-weight:700;cursor:pointer">닫기</button>
    </div>
  `);
}

          <div style="color:#fff;font-size:12px;opacity:0.7">${getThisWeekRange().mon}(월) ~ ${getThisWeekRange().fri}(금) · 과목 터치 시 상세 확인</div>
        </div>
      </div>
