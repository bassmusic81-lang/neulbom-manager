<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="늘봄관리">
<meta name="theme-color" content="#1F3864">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>정라초 늘봄 관리</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --primary:#1F3864;--primary2:#833C00;--accent:#4472C4;
  --bg:#F4F6FB;--card:#fff;--danger:#C00000;
  --muted:#8892A4;--border:#E2E8F0;--text:#1A1A2E;
  --green:#2C5F2E;
}
html,body{height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;color:var(--text);}
#app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;position:relative;overflow:hidden;}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.screen.hidden{display:none;}

/* 헤더 */
.header{padding:env(safe-area-inset-top,20px) 20px 20px;padding-top:calc(env(safe-area-inset-top,0px) + 20px);}
.header h1{color:#fff;font-size:20px;font-weight:800;}
.header .sub{color:rgba(255,255,255,0.7);font-size:12px;margin-top:2px;}
.back-btn{color:#fff;font-size:20px;background:none;border:none;cursor:pointer;margin-bottom:8px;padding:4px 0;}

/* 탭바 */
#tabbar{display:flex;background:#fff;border-top:1px solid var(--border);box-shadow:0 -2px 8px rgba(0,0,0,0.08);padding-bottom:env(safe-area-inset-bottom,0px);}
.tab-btn{flex:1;padding:10px 4px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;}
.tab-btn .icon{font-size:20px;}
.tab-btn .label{font-size:10px;color:var(--muted);font-weight:600;}
.tab-btn.active .label{color:var(--accent);}

/* 카드 */
.card{background:#fff;border-radius:14px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,0.07);margin-bottom:12px;}

/* 배지 */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;margin-right:4px;}

/* 검색바 */
.search-bar{padding:12px;background:#fff;border-bottom:1px solid var(--border);}
.search-bar input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;font-size:14px;outline:none;}
.search-bar input:focus{border-color:var(--accent);}

/* 필터 탭 */
.filter-tabs{display:flex;overflow-x:auto;padding:10px 12px;gap:6px;background:#fff;border-bottom:1px solid var(--border);}
.filter-tabs::-webkit-scrollbar{display:none;}
.filter-tab{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;}
.filter-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}

/* 학생 아이템 */
.student-item{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;cursor:pointer;background:#fff;}
.student-item:active{background:#f5f5f5;}
.stu-avatar{width:40px;height:40px;border-radius:20px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0;}
.stu-info{flex:1;}
.stu-name{font-weight:700;font-size:15px;}
.stu-phone{font-size:12px;color:var(--accent);font-weight:600;margin-top:2px;}
.stu-note{font-size:11px;color:var(--danger);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* 모달 */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:9999;display:flex;align-items:flex-end;}
.modal-overlay.hidden{display:none;}
.modal-sheet{background:var(--bg);border-radius:24px 24px 0 0;width:100%;max-height:90dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.modal-header{border-radius:24px 24px 0 0;padding:18px;}
.modal-header h2{color:#fff;font-size:20px;font-weight:900;}
.modal-header .cls-label{color:rgba(255,255,255,0.8);font-size:12px;}
.modal-close{background:rgba(255,255,255,0.2);border:none;border-radius:20px;width:34px;height:34px;color:#fff;font-size:16px;cursor:pointer;}
.modal-body{padding:14px;}

/* 출석부 */
.att-row{display:flex;align-items:center;border-bottom:1px solid var(--border);}
.att-info{flex:1;padding:10px 14px;cursor:pointer;}
.att-num{font-size:11px;color:var(--muted);min-width:22px;display:inline-block;text-align:right;margin-right:8px;}
.att-name{font-size:13px;font-weight:700;}
.att-status-btn{padding:10px 12px;border:none;background:none;cursor:pointer;display:flex;align-items:center;gap:4px;border-left:1px solid var(--border);min-width:82px;}
.att-dropdown{background:#fff;border-bottom:1px solid var(--border);padding:8px;display:flex;flex-wrap:wrap;gap:6px;}
.att-opt{flex:1;min-width:60px;padding:7px 8px;border-radius:20px;border:1.5px solid;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;font-size:11px;font-weight:700;}

/* 시간표 */
.tt-table{width:100%;border-collapse:collapse;}
.tt-table th,.tt-table td{border:1px solid var(--border);padding:4px 2px;text-align:center;font-size:9px;}
.tt-table th{font-weight:700;}
.subj-cell{border-radius:6px;padding:4px 3px;cursor:pointer;font-weight:800;font-size:9px;line-height:1.3;}

/* 캘린더 */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);}
.cal-cell{background:#fff;padding:6px 2px;text-align:center;cursor:pointer;min-height:44px;}
.cal-cell.today .day-num{background:var(--green);color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;margin:0 auto;}
.cal-cell.selected{background:#E8F5E9;}
.cal-dot{width:5px;height:5px;border-radius:50%;margin:2px auto 0;}

/* 홈 배너 */
.banner{background:var(--danger);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.banner-text h3{color:#fff;font-size:14px;font-weight:800;}
.banner-text p{color:rgba(255,255,255,0.85);font-size:11px;margin-top:1px;}
.banner-btn{background:rgba(255,255,255,0.25);border-radius:8px;padding:5px 10px;color:#fff;font-size:12px;font-weight:700;}

/* 홈 통계 */
.stats-row{display:flex;justify-content:space-around;background:rgba(255,255,255,0.12);border-radius:12px;padding:12px;margin-top:16px;}
.stat{text-align:center;}
.stat .val{color:#fff;font-size:24px;font-weight:900;}
.stat .lbl{color:#fff;font-size:11px;opacity:0.8;}
.stat-div{width:1px;background:rgba(255,255,255,0.2);}

/* 메뉴 그리드 */
.menu-grid{display:flex;flex-wrap:wrap;gap:12px;padding:16px;}
.menu-item{border-radius:14px;padding:16px;border:1.5px solid;cursor:pointer;}
.menu-item.wide{width:100%;}
.menu-item.half{width:calc(50% - 6px);}
.menu-item .menu-icon{font-size:28px;margin-bottom:8px;}
.menu-item h3{font-size:15px;font-weight:800;margin-bottom:3px;}
.menu-item p{font-size:11px;color:var(--muted);}

/* 요일 탭 */
.day-tabs{display:flex;background:#fff;border-bottom:1px solid var(--border);}
.day-tab{flex:1;padding:12px 4px;border:none;background:none;cursor:pointer;text-align:center;border-bottom:3px solid transparent;}
.day-tab .day{font-weight:700;font-size:14px;}
.day-tab .date{font-size:10px;color:var(--muted);}

/* 세션 카드 */
.session-card{border-radius:12px;overflow:hidden;margin-bottom:10px;}
.session-header{padding:10px 12px;}
.session-header h3{color:#fff;font-weight:800;font-size:14px;}

/* 특이사항 */
.incident-card{border-left:4px solid;border-radius:12px;padding:12px;background:#fff;margin-bottom:10px;}

/* 팝업 */
.popup{background:#fff;border-radius:18px;padding:0;overflow:hidden;width:calc(100% - 40px);max-height:80dvh;overflow-y:auto;}
.popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px;}
.popup-overlay.hidden{display:none;}

a{color:inherit;text-decoration:none;}
button{font-family:inherit;}
</style>
</head>

            <div id="stu-modal-cls" style="color:rgba(255,255,255,0.8);font-size:12px;"></div>
          </div>
        </div>

      </div>

    </div>

<div class="popup-overlay hidden" id="popup-overlay" onclick="closePopup()">

// ── 노트 자동 파싱 → 수강 특수 일정 ──
function parseSpecialFromNote(note) {
  if(!note) return null;
  const ALL = ["월","화","수","목","금"];
  const sp = {};

  function daysIn(text) { return ALL.filter(d=>text.includes(d)); }
  function addTo(key, arr) {
    if(!arr.length) return;
    sp[key] = [...new Set([...(sp[key]||[]), ...arr])];
  }

  // 전체 취소 (월~금)
  if(/전체\s*취소|월~금.*취소/.test(note)) return { skipDays:[...ALL] };

  // 붙여쓰기 취소: "월취소"
  ALL.forEach(d => { if(note.includes(d+'취소') && !note.includes(d+'취소 후')) addTo('skipDays',[d]); });

  // "X 맞춤형 취소" / "X 취소" (단, "취소 후" 제외)
  for(const m of note.matchAll(/([월화수목금·]+)\s*(?:맞춤형\s*)?취소(?!\s*후)/g))
    addTo('skipDays', daysIn(m[1]));

  // "매일 1교시만"
  if(/매일.*1교시만/.test(note)) sp.skipS2Days=[...ALL];

  // "X 1교시만"
  for(const m of note.matchAll(/([월화수목금·]+)\s*1교시만/g))
    addTo('skipS2Days', daysIn(m[1]));

  // "X 1교시 후 ... 차량/하교" → 1교시 후 하교 = 2교시 취소
  for(const m of note.matchAll(/([월화수목금·]+)\s*1교시\s*(?:후|이후)[^/\n]*(?:차량|하교|귀가)/g))
    addTo('skipS2Days', daysIn(m[1]));

  // "X 2교시 제외/취소/결석"
  for(const m of note.matchAll(/([월화수목금·]+)\s*2교시\s*(?:제외|취소|결석)/g))
    addTo('skipS2Days', daysIn(m[1]));

  // "X → 1교시 취소" (컴퓨터방과후)
  for(const m of note.matchAll(/([월화수목금·]+)[^→\n]*→\s*1교시\s*취소/g))
    addTo('skipS1Days', daysIn(m[1]));

  // "X 1교시 결석"
  for(const m of note.matchAll(/([월화수목금·]+)\s*1교시\s*결석/g))
    addTo('skipS1Days', daysIn(m[1]));

  // "X 2교시 결석"
  for(const m of note.matchAll(/([월화수목금·]+)\s*2교시\s*결석/g))
    addTo('skipS2Days', daysIn(m[1]));

  // 로봇과학A 대체
  if(/화.*로봇과학A/.test(note)) sp.replaceS1={...(sp.replaceS1||{}),화:"로봇과학A"};

  return Object.keys(sp).length>0 ? sp : null;
}

// 학생별 특수 일정 계산 (노트 파싱 + 수동 보완 병합)
function getStudentSpecial(nm, note) {
  const parsed = parseSpecialFromNote(note) || {};
  const override = MANUAL_OVERRIDE[nm] || {};
  const merged = {...parsed};
  for(const [k,v] of Object.entries(override)){
    if(Array.isArray(v))
      merged[k] = [...new Set([...(merged[k]||[]),...v])];
    else if(v && typeof v==='object')
      merged[k] = {...(merged[k]||{}), ...v};
    else merged[k]=v;
  }
  return Object.keys(merged).length>0 ? merged : null;
}

function goTo(screen){
  document.getElementById('screen-'+currentScreen).classList.add('hidden');
  document.getElementById('screen-'+screen).classList.remove('hidden');
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    const screens = ['home','students','attendance','timetable','notes'];
    b.classList.toggle('active', screens[i]===screen);
  });
  const banner = document.getElementById('banner');
  banner.style.display = screen==='home' ? 'flex' : 'none';
  currentScreen = screen;
  renderScreen(screen);
  // 최상단으로 스크롤
  const el = document.getElementById('screen-'+screen);
  if(el) el.scrollTop = 0;
  window.scrollTo(0,0);
}

// ── 학생 모달 ──
function openStuModal(id){
  const s = STUDENTS.find(x=>x.id===id);
  if(!s) return;
  const hc = s.grade===1 ? 'var(--primary)' : 'var(--primary2)';
  const sc = SCHEDULES[s.clsKey]||{};
  const dc = {월:"#4472C4",화:"#70AD47",수:"#ED7D31",목:"#9B59B6",금:"#C00000"};
  const nm = s.name.trim();
  const is2 = s.grade===2;

  // 개인 특수 일정: 노트 자동 파싱 + 수동 보완
  const SKIP_ALL_M   = new Set(["허  산"]);
  const WED_JUSA_M   = new Set(["이연희"]);
  const sp = getStudentSpecial(nm, s.note);

  // 요일별 수강 현황 계산
  function getPersonalSubjs(day) {
    if(SKIP_ALL_M.has(nm)) return null;
    if(WED_JUSA_M.has(nm)) return day==='수' ? ['주산암산'] : null;
    if(sp?.skipDays?.includes(day)) return null;

    const daysc = sc[day]||[];
    const subjs = [];

    if(!is2) {
      // 1학년: replaceS1/S2 포함
      const s1raw = (sp?.replaceS1?.[day]) || daysc[0];
      const s2raw = (sp?.replaceS2?.[day]) || daysc[1];
      if(!sp?.skipS1Days?.includes(day) && s1raw && s1raw!=='—') subjs.push(s1raw);
      if(!sp?.skipS2Days?.includes(day) && s2raw) subjs.push(s2raw);
    } else {
      if(day==='월') {
        // s[0]="—" 건너뜀, s[1]=2교시, s[2]=3교시
        if(!sp?.skipS2Days?.includes(day) && daysc[1] && daysc[1]!=='—') subjs.push(daysc[1]);
        if(!sp?.skipS3Days?.includes(day) && daysc[2]) subjs.push(daysc[2]);
      } else if(day==='수') {
        const s1w = (sp?.replaceS1?.[day]) || (daysc[0]&&daysc[0]!=='—'?daysc[0]:null);
        const s2w = (sp?.replaceS2?.[day]) || daysc[1];
        if(!sp?.skipS1Days?.includes(day) && s1w) subjs.push(s1w);
        if(!sp?.skipS2Days?.includes(day) && s2w) subjs.push(s2w);
      } else {
        // 화·목·금
        const s1 = (sp?.replaceS1?.[day]) || (daysc[0]&&daysc[0]!=='—'?daysc[0]:null);
        const s2 = (sp?.replaceS2?.[day]) || daysc[1];
        if(!sp?.skipS1Days?.includes(day) && s1) subjs.push(s1);
        if(!sp?.skipS2Days?.includes(day) && s2) subjs.push(s2);
      }
    }
    return subjs.length>0 ? subjs : [];
  }

  document.getElementById('stu-modal-header').style.background = hc;
  document.getElementById('stu-modal-avatar').textContent = s.num||'?';
  document.getElementById('stu-modal-name').textContent = s.name;
  document.getElementById('stu-modal-cls').textContent = s.clsLabel;
  document.getElementById('stu-modal-phone').innerHTML = s.phone
    ? `<a href="tel:${s.phone}" style="background:rgba(255,255,255,0.15);border-radius:10px;padding:6px 12px;color:#fff;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px">📞 ${s.phone}</a>`
    : `<span style="color:rgba(255,255,255,0.5);font-size:12px">연락처 없음</span>`;

  document.getElementById('stu-modal-body').innerHTML = `
    ${s.note?`<div style="background:#FFF0F0;border-radius:12px;padding:14px;border:1.5px solid #FFCDD2;margin-bottom:10px">
      <div style="font-size:12px;font-weight:700;color:var(--danger);margin-bottom:6px">⚠ 특이사항</div>
      <div style="font-size:13px;color:var(--danger);line-height:20px;white-space:pre-line">${s.note}</div>
    </div>`:''}
    <div style="background:#fff;border-radius:12px;padding:14px;border:1px solid var(--border)">
      <div style="font-size:13px;font-weight:700;color:var(--muted);margin-bottom:10px">📅 이번주 수강 현황 (4/14~4/18)</div>
      ${DAYS.map(day=>{
        const subjs = getPersonalSubjs(day);
        const isCancelled = subjs===null;
        const isEmpty = !isCancelled && subjs.length===0;

        // 슬롯 키 계산 (과목 팝업용)
        function getSlotKey(idx) {
          if(!is2) return idx===0?'s1':'s2';
          if(day==='수') return idx===0?'s1':'s2';
          if(day==='월') return idx===0?'s2':'s3'; // 2학년 월: s[1]=2교시,s[2]=3교시
          return idx===0?'s1':'s2';
        }

        return `<div style="display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
          <div style="width:28px;height:28px;border-radius:7px;background:${isCancelled?'#EEE':dc[day]+'20'};display:flex;align-items:center;justify-content:center;flex-shrink:0">
            <span style="font-weight:800;font-size:12px;color:${isCancelled?'#AAA':dc[day]}">${day}</span>
          </div>
          <div style="flex:1">
            <div style="font-size:10px;color:var(--muted);margin-bottom:3px">${day}요일 (${DAY_DATES[day]})</div>
            ${isCancelled
              ? `<span style="background:#FFCDD2;color:#B71C1C;border-radius:5px;padding:2px 7px;font-size:11px;font-weight:700">취소</span>`
              : isEmpty
                ? `<span style="color:var(--muted);font-size:12px">맞춤형 없음</span>`
                : subjs.map((subj,idx)=>`
                  <span onclick="closeStuModal();setTimeout(()=>showSubjDetail('${subj}','${day}','${getSlotKey(idx)}'),150)"
                    style="background:${gc(subj)}20;color:${gc(subj)};border-radius:6px;padding:3px 7px;font-size:11px;font-weight:700;border:1px solid ${gc(subj)}44;margin-right:4px;display:inline-block;margin-bottom:3px;cursor:pointer">
                    ${subj} 📍
                  </span>`).join('')
            }
          </div>
        </div>`;
      }).join('')}
    </div>
    <div style="height:20px"></div>
  `;

  document.getElementById('stu-modal').classList.remove('hidden');
}

function closeStuModal(){
  document.getElementById('stu-modal').classList.add('hidden');
}

// ── 출석부 ──
function renderAttendance(){
  // ── 세션 계산 (시간표 구조와 동일하게) ──
  // 1학년 월·수: s[0]=맞춤형1교시(13:10), s[1]=맞춤형2교시(14:00)
  // 1학년 화·목·금: s[0]=맞춤형1교시(13:50), s[1]=맞춤형2교시(14:40)
  // 2학년 수: s[0]=맞춤형1교시(13:10), s[1]=맞춤형2교시(14:00)
  // 2학년 월: s[1]=맞춤형2교시(14:00), s[2]=맞춤형3교시(14:40) — s[0]="—" 건너뜀
  // 2학년 화·목·금: s[0]=맞춤형1교시(13:50), s[1]=맞춤형2교시(14:40)

  const TIME_LABEL = {
    's1_1학년_월수': '맞춤형1교시 13:10~13:50',
    's1_1학년_화목금': '맞춤형1교시 13:50~14:30',
    's2_1학년_월수': '맞춤형2교시 14:00~14:40',
    's2_1학년_화목금': '맞춤형2교시 14:40~15:20',
    's1_2학년_수': '맞춤형1교시 13:10~13:50',
    's2_2학년_수': '맞춤형2교시 14:00~14:40',
    's2_2학년_월': '맞춤형2교시 14:00~14:40',
    's3_2학년_월': '맞춤형3교시 14:40~15:20',
    's1_2학년_화목금': '맞춤형1교시 13:50~14:30',
    's2_2학년_화목금': '맞춤형2교시 14:40~15:20',
  };

  // 세션별 순서 관리
  const sessionOrder = {};
  const sessions = {};

  function addToSession(subj, timeLabel, order, stu) {
    if(!subj || subj==='—') return;
    // 복합과목(+) 분리
    const parts = subj.includes('+') ? subj.split('+') : [subj];
    parts.forEach(p => {
      p = p.trim();
      const key = `${p}(${timeLabel})`;
      if(!sessions[key]) { sessions[key]=[]; sessionOrder[key]=order; }
      sessions[key].push(stu);
    });
  }

  // 1-4반 월요일 분반: 도자공예 vs 종이접기
  const DOZA_ONLY  = new Set(["김민우"]);
  const DOZA_S1    = new Set(["서가윤","신다혜","양희서","정나은","최아린"]);
  const SKIP_ALL   = new Set(["허  산"]);
  const WED_JUSA_ONLY = new Set(["이연희"]);

  const d = currentDay;
  for(const [k,sc] of Object.entries(SCHEDULES)){
    const [g,cl] = k.split('-').map(Number);
    const dj = sc[d]; if(!dj) continue;
    const roster = STUDENTS.filter(s=>s.grade===g&&s.cls===cl);

    for(const stu of roster){
      const nm = stu.name.trim();

      if(SKIP_ALL.has(nm)) continue;

      if(WED_JUSA_ONLY.has(nm)) {
        if(d==='수') addToSession('주산암산', TIME_LABEL['s1_2학년_수'], 1, stu);
        continue;
      }

      // 노트에서 개인 특수 일정 계산
      const sp = getStudentSpecial(nm, stu.note);
      if(sp?.skipDays?.includes(d)) continue;
      if(g===1) {
        if(d==='월'||d==='수') {
          if(cl===4 && d==='월') {
            if(DOZA_ONLY.has(nm)) {
              addToSession('도자공예', TIME_LABEL['s1_1학년_월수'], 1, stu);
            } else if(DOZA_S1.has(nm)) {
              addToSession('도자공예', TIME_LABEL['s1_1학년_월수'], 1, stu);
              if(!sp?.skipS2Days?.includes(d)) addToSession(dj[1], TIME_LABEL['s2_1학년_월수'], 2, stu);
            } else {
              addToSession('종이접기', TIME_LABEL['s1_1학년_월수'], 1, stu);
              if(!sp?.skipS2Days?.includes(d)) addToSession(dj[1], TIME_LABEL['s2_1학년_월수'], 2, stu);
            }
          } else {
            if(!sp?.skipS1Days?.includes(d)) addToSession(dj[0], TIME_LABEL['s1_1학년_월수'], 1, stu);
            if(!sp?.skipS2Days?.includes(d)) addToSession(dj[1], TIME_LABEL['s2_1학년_월수'], 2, stu);
          }
        } else {
          const s1subj1 = (sp?.replaceS1?.[d]) || dj[0];
          const s2subj1 = (sp?.replaceS2?.[d]) || dj[1];
          if(!sp?.skipS1Days?.includes(d)) addToSession(s1subj1, TIME_LABEL['s1_1학년_화목금'], 1, stu);
          if(!sp?.skipS2Days?.includes(d)) addToSession(s2subj1, TIME_LABEL['s2_1학년_화목금'], 2, stu);
        }
      } else {
        if(d==='수') {
          const s1w = (sp?.replaceS1?.[d]) || dj[0];
          const s2w = (sp?.replaceS2?.[d]) || dj[1];
          if(!sp?.skipS1Days?.includes(d)) addToSession(s1w, TIME_LABEL['s1_2학년_수'], 1, stu);
          if(!sp?.skipS2Days?.includes(d)) addToSession(s2w, TIME_LABEL['s2_2학년_수'], 2, stu);
        } else if(d==='월') {
          if(!sp?.skipS2Days?.includes(d)) addToSession(dj[1], TIME_LABEL['s2_2학년_월'], 2, stu);
          if(!sp?.skipS3Days?.includes(d)) addToSession(dj[2], TIME_LABEL['s3_2학년_월'], 3, stu);
        } else {
          const s1subj = (sp?.replaceS1?.[d]) || dj[0];
          const s2subj = (sp?.replaceS2?.[d]) || dj[1];
          if(!sp?.skipS1Days?.includes(d)) addToSession(s1subj, TIME_LABEL['s1_2학년_화목금'], 1, stu);
          if(!sp?.skipS2Days?.includes(d)) addToSession(s2subj, TIME_LABEL['s2_2학년_화목금'], 2, stu);
        }
      }
    }
  }


  // 과목명 기준 정렬 → 같은 과목끼리 묶고 교시 순 정렬
  const sortedSessions = Object.entries(sessions).sort((a,b)=>{
    const subjA = a[0].split('(')[0], subjB = b[0].split('(')[0];
    if(subjA !== subjB) return subjA.localeCompare(subjB, 'ko');
    return (sessionOrder[a[0]]||9) - (sessionOrder[b[0]]||9);
  });
  const dc = {월:"#4472C4",화:"#70AD47",수:"#ED7D31",목:"#9B59B6",금:"#C00000"};

  document.getElementById('screen-attendance').innerHTML = `
    <div style="background:var(--primary);padding:20px;padding-top:calc(env(safe-area-inset-top,0px)+20px)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="color:#fff;font-size:20px;font-weight:800">요일별 출석부</div>
        <button onclick="resetAtt()" style="background:rgba(255,255,255,0.2);border:none;border-radius:8px;padding:5px 10px;color:#fff;font-size:11px;font-weight:700;cursor:pointer">🔄 초기화</button>
      </div>
      <div style="color:rgba(255,255,255,0.7);font-size:11px">${currentDay}요일(${DAY_DATES[currentDay]}) · 출석 체크 시 자동 저장</div>
    </div>
    <div class="day-tabs">
      ${DAYS.map(d=>`
        <button class="day-tab ${currentDay===d?'active':''}" onclick="currentDay='${d}';renderAttendance()" 
          style="border-bottom-color:${currentDay===d?dc[d]:'transparent'}">
          <div class="day" style="color:${currentDay===d?dc[d]:'var(--muted)'}">${d}</div>
          <div class="date">${DAY_DATES[d]}</div>
        </button>`).join('')}
    </div>

function toggleDrop(key){
  openDrop = openDrop===key ? null : key;
  renderAttendance();
}

function setAttStatus(dropKey, e){
  const optKey = e.currentTarget.dataset.key;
  attData[dropKey] = optKey;
  saveAtt();
  openDrop = null;
  renderAttendance();
}

function markAllPresent(session, ids){
  ids.forEach(id=>{ attData[`${session}|${id}`]='present'; });
  saveAtt();
  renderAttendance();
}

function resetAtt(){
  if(!confirm('이 요일 출석 기록을 초기화할까요?')) return;
  Object.keys(attData).forEach(k=>{ delete attData[k]; });
  saveAtt();
  renderAttendance();
}

// ── 시간표 ──
// ── 수강자 명단 계산 ──
function getRoster(subj, day, clsKey) {
  if(!subj || subj==='—') return [];
  const roster = [];
  // 현재 반 학생 중 해당 요일 해당 과목 수업인 학생
  const [g,cl] = clsKey.split('-').map(Number);
  const sc = SCHEDULES[clsKey]||{};
  const daySubjs = sc[day]||[];
  if(!daySubjs.some(s=>s&&s.includes(subj))) return [];
  return STUDENTS.filter(s=>s.grade===g && s.cls===cl)
    .sort((a,b)=>a.num-b.num);
}

function getRosterAllClasses(subj, day, slot) {
  const DOZA_ONLY = new Set(["김민우"]);
  const DOZA_S1   = new Set(["서가윤","신다혜","양희서","정나은","최아린"]);
  const SKIP_ALL  = new Set(["허  산"]);
  const WED_JUSA_ONLY = new Set(["이연희"]);
  const result = [];

  // 학년·요일·슬롯 → 시간표상 위치(index) 반환
  function getExpectedPos(grade, day, slot) {
    if(grade===1) {
      // 월·수: s1=pos0, s2=pos1 / 화·목·금: s1=pos0, s2=pos1
      return slot==='s1'?0:slot==='s2'?1:null;
    } else {
      if(day==='수') return slot==='s1'?0:slot==='s2'?1:null;
      if(day==='월') return slot==='s1'?null:slot==='s2'?1:slot==='s3'?2:null; // s1=정규
      return slot==='s1'?0:slot==='s2'?1:null; // 화·목·금
    }
  }

  for(const [clsKey, sc] of Object.entries(SCHEDULES)){
    const [g,cl] = clsKey.split('-').map(Number);
    const daySubjs = sc[day]||[];

    // 해당 슬롯에 이 과목이 있는지 확인
    const pos = getExpectedPos(g, day, slot);
    if(pos===null) continue;
    const subjAtPos = daySubjs[pos]||'';
    if(!subjAtPos.includes(subj)) continue;

    const stus = STUDENTS.filter(s=>s.grade===g && s.cls===cl);
    for(const stu of stus){
      const nm = stu.name.trim();
      if(SKIP_ALL.has(nm)) continue;
      if(WED_JUSA_ONLY.has(nm)){
        if(day==='수'&&subj==='주산암산') result.push(stu);
        continue;
      }
      // 2-2반 월요일 종이접기 맞춤형2교시 제외 → 발레로 변경됨
      // 월요일 종이접기 맞춤형3교시: 안건우·최가윤 제외 (도자공예 후 하교)
      if(day==='월'&&subj==='종이접기'&&slot==='s3'&&(nm==='안건우'||nm==='최가윤')) continue;
      // 1-4반 월요일 분반
      if(g===1&&cl===4&&day==='월'){
        if(subj==='도자공예'){
          if(DOZA_ONLY.has(nm)||DOZA_S1.has(nm)) result.push(stu);
        } else if(subj==='종이접기'){
          if(!DOZA_ONLY.has(nm)&&!DOZA_S1.has(nm)) result.push(stu);
        } else {
          // 칼라클레이 등: 도자공예만인 김민우 제외
          if(!DOZA_ONLY.has(nm)) result.push(stu);
        }
        continue;
      }
      result.push(stu);
    }
  }
  return result.sort((a,b)=>a.grade!==b.grade?a.grade-b.grade:a.cls!==b.cls?a.cls-b.cls:a.num-b.num);
}

// ── 시간표 셀 렌더 헬퍼 ──
function ttCell(subj, day, slot) {
  if(!subj || subj==='—') return `<td style="padding:3px 2px;text-align:center"><div style="background:#F5F5F5;border-radius:6px;padding:6px 3px;font-size:8px;color:#CCC;min-height:32px;display:flex;align-items:center;justify-content:center">—</div></td>`;
  if(subj==='정규') return `<td style="padding:3px 2px;text-align:center"><div style="background:#F0F2F8;border-radius:6px;padding:6px 3px;font-size:8px;color:#8892A4;min-height:32px;display:flex;align-items:center;justify-content:center">정규수업</div></td>`;
  const parts = subj.includes('+') ? subj.split('+') : [subj];
  const cells = parts.map(p=>{
    p=p.trim();
    const color=gc(p);
    const place=getPlace(p);
    return `<div class="subj-cell" onclick="showSubjDetail('${p}','${day}','${slot}')"
      style="background:${color}20;color:${color};border:1.5px solid ${color}66;border-radius:7px;padding:5px 3px;margin-bottom:2px;cursor:pointer;min-height:32px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px">
      <span style="font-weight:800;font-size:9px;text-align:center;line-height:1.2">${p}</span>
      ${place?`<span style="font-size:7px;opacity:0.75;text-align:center;line-height:1.2">${place.replace('\n',' ')}</span>`:''}
    </div>`;
  }).join('');
  return `<td style="padding:3px 2px;text-align:center">${cells}</td>`;
}

function renderTimetable(){
  const sc = SCHEDULES[currentTTClass]||{};
  const grade = parseInt(currentTTClass[0]);
  const is2 = grade===2;
  const hc = is2 ? 'var(--primary2)' : 'var(--primary)';
  const COL_COLORS = {월:"#4472C4",화:"#70AD47",수:"#ED7D31",목:"#9B59B6",금:"#C00000"};

  // 요일별 슬롯 계산 (엑셀과 동일한 구조)
  function getSlot(day, slotIdx) {
    const daysc = sc[day]||[];
    if(!is2) {
      // 1학년: 월·수=row3시작, 화·목·금=row4시작(row3=정규)
      if(day==='월'||day==='수') {
        if(slotIdx===0) return daysc[0]||null;
        if(slotIdx===1) return daysc[1]||null;
        return null;
      } else {
        if(slotIdx===0) return '정규';
        if(slotIdx===1) return daysc[0]||null;
        if(slotIdx===2) return daysc[1]||null;
        return null;
      }
    } else {
      // 2학년: 수=row3시작, 월=row4시작(s[1]부터), 화·목·금=row4시작
      if(day==='수') {
        return daysc[slotIdx]||null;
      } else if(day==='월') {
        if(slotIdx===0) return '정규';
        if(slotIdx===1) return daysc[1]||null;
        if(slotIdx===2) return daysc[2]||null;
        return null;
      } else {
        if(slotIdx===0) return '정규';
        if(slotIdx===1) return daysc[0]||null;
        if(slotIdx===2) return daysc[1]||null;
        return null;
      }
    }
  }

  const slotKeys = ['s1','s2','s3'];
  const slotLabels = !is2
    ? ["월·수 13:10~13:50\n화·목·금 정규수업", "월·수 14:00~14:40\n화·목·금 13:50~14:30", "화·목·금 14:40~15:20"]
    : ["수 13:10~13:50\n월·화·목·금 정규수업", "수 14:00~14:40\n월·화·목·금 13:50~14:30", "월·수 14:40~15:20\n화·목·금 14:40~15:20"];

  function renderSlotRow(slotIdx) {
    const tlbl = slotLabels[slotIdx].replace('\n','<br>');
    const skey = slotKeys[slotIdx];
    return `<tr style="border-top:${slotIdx===0?'2px solid '+hc:'1px solid #E0E0E0'}">
      <td style="padding:5px 4px;background:${hc}18;font-size:8px;color:${hc};font-weight:800;text-align:center;line-height:1.4;white-space:pre-line;vertical-align:middle;min-width:52px">${tlbl}</td>
      ${DAYS.map(d=>{
        const subj=getSlot(d,slotIdx);
        if(!subj) return `<td style="padding:3px 2px;text-align:center"><div style="background:#F5F5F5;border-radius:6px;padding:6px 3px;font-size:8px;color:#CCC;min-height:32px;display:flex;align-items:center;justify-content:center">—</div></td>`;
        if(subj==='정규') return `<td style="padding:3px 2px;text-align:center"><div style="background:#F0F2F8;border-radius:6px;padding:6px 3px;font-size:8px;color:#8892A4;min-height:32px;display:flex;align-items:center;justify-content:center">정규수업</div></td>`;
        const parts=subj.includes('+')?subj.split('+'):[subj];
        return `<td style="padding:3px 2px;text-align:center">${parts.map(p=>{
          p=p.trim();
          const color=gc(p); const place=getPlace(p);
          return `<div onclick="showSubjDetail('${p}','${d}','${skey}')"
            style="background:${color}20;color:${color};border:1.5px solid ${color}66;border-radius:7px;padding:5px 3px;margin-bottom:2px;cursor:pointer;min-height:34px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px">
            <span style="font-weight:800;font-size:9px;text-align:center;line-height:1.2">${p}</span>
            <span style="font-size:7px;opacity:0.75;text-align:center;line-height:1.2">${place.split(' ').slice(0,2).join(' ')}</span>
          </div>`;
        }).join('')}</td>`;
      }).join('')}
    </tr>`;
  }

  document.getElementById('screen-timetable').innerHTML = `
    <div style="background:${hc};padding:20px;padding-top:calc(env(safe-area-inset-top,0px)+20px)">
      <div style="color:#fff;font-size:20px;font-weight:800">반별 시간표</div>
      <div style="color:#fff;font-size:12px;opacity:0.7">4/14(월) ~ 4/18(금) · 과목 터치 시 상세 확인</div>
    </div>
    <!-- 반 탭 -->
    <div style="display:flex;overflow-x:auto;background:#fff;border-bottom:1px solid var(--border);padding:10px 12px;gap:6px">
      ${Object.keys(SCHEDULES).map(k=>{
        const g=parseInt(k[0]); const hk=g===1?'var(--primary)':'var(--primary2)';
        return `<button onclick="currentTTClass='${k}';renderTimetable()"
          style="flex-shrink:0;padding:7px 14px;border-radius:20px;border:2px solid ${currentTTClass===k?hk:'var(--border)'};background:${currentTTClass===k?hk:'#fff'};color:${currentTTClass===k?'#fff':'var(--text)'};font-size:14px;font-weight:700;cursor:pointer">${k}</button>`;
      }).join('')}
    </div>
    <div style="padding:12px">
      <!-- 제목 -->
      <div style="background:${hc};border-radius:12px 12px 0 0;padding:10px 14px;text-align:center">
        <div style="color:#fff;font-size:14px;font-weight:800">4월 14일(월) ~ 4월 18일(금) · 맞춤형 프로그램 시간표 · (${currentTTClass})</div>
      </div>
      <!-- 시간표 테이블 -->
      <div style="background:#fff;border-radius:0 0 12px 12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.07)">
        <table style="width:100%;border-collapse:collapse">
          <!-- 요일 헤더 -->
          <tr>
            <th style="background:#2C3E50;color:#fff;padding:8px 4px;font-size:10px;text-align:center;width:52px">요일/시간</th>
            ${DAYS.map(d=>`<th style="background:${COL_COLORS[d]};color:#fff;padding:6px 2px;font-size:11px;font-weight:800;text-align:center">
              <div>${d}</div>
              <div style="font-size:9px;font-weight:400;opacity:0.9">${DAY_DATES[d]}</div>
            </th>`).join('')}
          </tr>
          <!-- 정규수업 표시 행 -->
          <tr style="background:#F8F9FD">
            <td style="padding:5px 4px;background:#ECEEF5;font-size:8px;color:#7B8CB0;font-weight:700;text-align:center">1~4교시<br><span style="font-weight:400">정규수업</span></td>
            ${DAYS.map(()=>`<td style="padding:3px 2px;text-align:center"><div style="background:#F0F2F8;border-radius:6px;padding:5px 3px;font-size:8px;color:#8892A4;min-height:28px;display:flex;align-items:center;justify-content:center">정규수업</div></td>`).join('')}
          </tr>
          <!-- 점심 -->
          <tr style="background:#FFFBF0">
            <td style="padding:5px 4px;background:#FFF5D6;font-size:8px;color:#B8860B;font-weight:700;text-align:center">점심<br><span style="font-weight:400">11:30</span></td>
            ${DAYS.map(()=>`<td style="padding:3px 2px;text-align:center"><div style="background:#FFF5D6;border-radius:6px;padding:5px 3px;font-size:9px;color:#B8860B;min-height:28px;display:flex;align-items:center;justify-content:center">🍱 점심</div></td>`).join('')}
          </tr>
          <!-- 맞춤형 슬롯 3행 -->
          ${renderSlotRow(0)}
          ${renderSlotRow(1)}
          ${renderSlotRow(2)}
          <!-- 하교 -->
          <tr style="background:#F0FFF4">
            <td style="padding:5px 4px;background:#D4EDDA;font-size:8px;color:#375623;font-weight:700;text-align:center">하교</td>
            ${DAYS.map(d=>`<td style="padding:3px 2px;text-align:center"><div style="background:#D4EDDA;border-radius:6px;padding:5px 3px;font-size:8px;color:#375623;min-height:28px;display:flex;align-items:center;justify-content:center">🏠 ${(!is2&&(d==='월'||d==='수'))||(is2&&d==='수')?'14:40':'15:20'}</div></td>`).join('')}
          </tr>
        </table>
      </div>
      <!-- 안내 문구 -->
      <div style="background:#FFFFF2CC;border-radius:8px;padding:8px 12px;margin-top:8px;border:1px solid #E6D800">
        <div style="font-size:10px;color:#7B2C00">※ 화·목·금요일은 맞춤형 수업 13:50부터 시작합니다.</div>
        <div style="font-size:10px;color:#C55A11;font-weight:700;margin-top:3px">※ 화요일 로봇과학 수업은 수익자부담 · 2동 1층 전담교실 1 · 1교시 13:50~14:30 / 2교시 14:40~15:20</div>
      </div>
      <div style="background:var(--danger);border-radius:8px;padding:8px 12px;margin-top:6px;text-align:center">
        <div style="font-size:11px;color:#fff;font-weight:700">★ ${!is2?'월·수요일 하교: 14:40  /  화·목·금요일 하교: 15:20':'수요일 하교: 14:40  /  화·목·금요일 하교: 15:20'}</div>
      </div>
    </div>
  `;
}

// ── 특이사항 ──
function renderNotes(){
  const noteStus = STUDENTS.filter(s=>s.note);
  document.getElementById('screen-notes').innerHTML = `
    <div style="background:#7B2C00;padding:20px;padding-top:calc(env(safe-area-inset-top,0px)+20px)">
      <div style="color:#fff;font-size:20px;font-weight:800">특이사항</div>
      <div style="color:#fff;font-size:12px;opacity:0.7">${noteStus.length}명 기록됨 · 수업별 ${INCIDENTS.length}건</div>
    </div>
    <div style="display:flex;background:#fff;border-bottom:1px solid var(--border)">
      <button onclick="notesTab='students';renderNotes()" style="flex:1;padding:12px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:700;color:${notesTab==='students'?'#7B2C00':'var(--muted)'};border-bottom:3px solid ${notesTab==='students'?'#7B2C00':'transparent'}">학생 특이사항</button>
      <button onclick="notesTab='incidents';renderNotes()" style="flex:1;padding:12px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:700;color:${notesTab==='incidents'?'#7B2C00':'var(--muted)'};border-bottom:3px solid ${notesTab==='incidents'?'#7B2C00':'transparent'}">수업별 특이사항</button>
    </div>
    <div style="padding:12px">
      ${notesTab==='students' ? noteStus.map(s=>{
        const isW=s.note.includes("⚠");
        const bc=isW?"#F44336":"#FFB347";
        return `<div class="incident-card" style="border-color:${bc}">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap">
            <span style="font-weight:800;font-size:15px">${s.name}</span>
            <span style="background:${s.grade===1?"#1F386420":"#833C0020"};color:${s.grade===1?"var(--primary)":"var(--primary2)"};border-radius:4px;padding:1px 6px;font-size:11px;font-weight:700">${s.clsLabel}</span>
            ${isW?`<span style="background:#FFCDD2;color:var(--danger);border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700">⚠ 민원</span>`:''}
          </div>
          <div style="font-size:12px;color:#555;line-height:18px;white-space:pre-line">${s.note}</div>
          ${s.phone?`<a href="tel:${s.phone}" style="font-size:12px;color:var(--accent);font-weight:600;margin-top:8px;display:block">📞 ${s.phone}</a>`:''}
        </div>`;
      }).join('') : INCIDENTS.map(inc=>{
        const tag=inc.tag||'';
        let bc="#FFB347";
        if(tag.includes("처리완료")) bc="#375623";
        else if(tag.includes("출석관리")) bc="#4472C4";
        else if(tag.includes("폭행")) bc="#C00000";
        else if(tag.includes("⚠")) bc="#FF6B35";
        return `<div class="incident-card" style="border-color:${bc}">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap">
            <span style="background:${bc}22;color:${bc};border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700">${inc.date}</span>
            <span style="font-weight:800;font-size:13px;color:#7B2C00;flex:1">${inc.subject}</span>
            <span style="background:${bc}22;color:${bc};border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700">${tag}</span>
          </div>
          <div style="font-size:12px;font-weight:700;color:#B71C1C;margin-bottom:4px;white-space:pre-line">${inc.student}</div>
          <div style="font-size:12px;color:#555;line-height:18px;margin-bottom:6px;white-space:pre-line">${inc.content}</div>
          <div style="font-size:11px;color:${bc};font-weight:600">▶ ${inc.action}</div>
        </div>`;
      }).join('')}
    </div>
  `;
}

// ── 학사일정 ──
function renderCalendar(){
  const y=currentCalMonth.getFullYear(), m=currentCalMonth.getMonth();
  const today=new Date();
  const todayKey=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const monthNames=["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];
  const dayNames=["일","월","화","수","목","금","토"];
  const daysInMonth=new Date(y,m+1,0).getDate();
  const firstDay=new Date(y,m,1).getDay();
  const cells=[...Array(firstDay).fill(null),...Array.from({length:daysInMonth},(_,i)=>i+1)];
  while(cells.length%7!==0) cells.push(null);

  document.getElementById('screen-calendar').innerHTML = `
    <div style="background:var(--green);padding:20px;padding-top:calc(env(safe-area-inset-top,0px)+20px)">
      <button class="back-btn" onclick="goTo('home')">← 홈으로</button>
      <div style="color:#fff;font-size:20px;font-weight:800">학사일정</div>
      <div style="color:#fff;font-size:12px;opacity:0.7">2026년도 1학기</div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding:16px;background:#fff;border-bottom:1px solid var(--border)">
      <button onclick="prevMonth()" style="background:none;border:none;font-size:24px;color:var(--green);cursor:pointer;padding:4px 8px">‹</button>
      <span style="font-size:18px;font-weight:800">${y}년 ${monthNames[m]}</span>
      <button onclick="nextMonth()" style="background:none;border:none;font-size:24px;color:var(--green);cursor:pointer;padding:4px 8px">›</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);background:#F0F4F0;padding:6px 0">
      ${dayNames.map((d,i)=>`<div style="text-align:center;font-size:11px;font-weight:700;color:${i===0?'#E53935':i===6?'#1565C0':'#555'}">${d}</div>`).join('')}
    </div>
    <div class="cal-grid">
      ${Array.from({length:cells.length/7},(_,row)=>
        cells.slice(row*7,(row+1)*7).map((d,col)=>{
          if(!d) return `<div class="cal-cell" style="border-bottom:1px solid #F0F0F0"></div>`;
          const key=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          const isToday=key===todayKey;
          const hasEv=!!CALENDAR[key];
          const isHol=CALENDAR[key]?.some(e=>e.type==='holiday');
          const dayColor=col===0?'#E53935':col===6?'#1565C0':isHol?'#E53935':'var(--text)';
          return `<div class="cal-cell" style="border-bottom:1px solid #F0F0F0" onclick="showCalEvent('${key}')">
            <div style="${isToday?'background:var(--green);color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;margin:0 auto;':''}font-size:13px;font-weight:${isToday?'800':'400'};color:${isToday?'#fff':dayColor}">${d}</div>
            ${hasEv?`<div style="width:5px;height:5px;border-radius:50%;background:${isHol?'#E53935':'#FF6B35'};margin:2px auto 0"></div>`:''}
          </div>`;
        }).join('')
      ).join('')}
    </div>
    <div style="margin:12px;border-radius:12px;overflow:hidden;border:1px solid #C8E6C9">
      <div style="background:var(--green);padding:10px"><span style="color:#fff;font-weight:800;font-size:13px">${monthNames[m]} 주요 일정</span></div>
      ${Array.from({length:daysInMonth},(_,i)=>i+1).filter(d=>CALENDAR[`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`]).map(d=>{
        const key=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const evs=CALENDAR[key];
        const isHol=evs.some(e=>e.type==='holiday');
        const dayN=dayNames[new Date(y,m,d).getDay()];
        return `<div style="padding:10px;border-bottom:1px solid #F0F0F0;display:flex;gap:10px">
          <div style="width:40px;text-align:center">
            <div style="font-size:13px;font-weight:700;color:${isHol?'#E53935':'var(--green)'}">${d}일</div>
            <div style="font-size:10px;color:var(--muted)">${dayN}</div>
          </div>
          <div style="flex:1">
            ${evs.map(ev=>`<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
              <div style="width:6px;height:6px;border-radius:50%;background:${ev.type==='holiday'?'#E53935':ev.type==='vacation'?'#1565C0':'#FF6B35'}"></div>
              <span style="font-size:12px">${ev.label}</span>
            </div>`).join('')}
          </div>
        </div>`;
      }).join('') || '<div style="padding:12px;text-align:center;color:var(--muted);font-size:13px">이번 달 등록된 일정 없음</div>'}
    </div>
  `;
}

function showCalEvent(key){
  const evs = CALENDAR[key];
  if(!evs) return;
  const [y,m,d] = key.split('-');
  showPopup(`
    <div style="background:var(--green);padding:16px;border-radius:18px 18px 0 0">
      <div style="color:#fff;font-size:16px;font-weight:800">${parseInt(m)}월 ${parseInt(d)}일</div>
    </div>
    <div style="padding:16px">
      ${evs.map(ev=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)">
        <div style="width:8px;height:8px;border-radius:50%;background:${ev.type==='holiday'?'#E53935':ev.type==='vacation'?'#1565C0':'#FF6B35'}"></div>
        <span style="font-size:14px;font-weight:600">${ev.label}</span>
      </div>`).join('')}
      <button onclick="closePopup()" style="width:100%;background:var(--green);color:#fff;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;margin-top:14px">닫기</button>
    </div>
  `);
}

function prevMonth(){ currentCalMonth=new Date(currentCalMonth.getFullYear(),currentCalMonth.getMonth()-1,1); renderCalendar(); }
function nextMonth(){ currentCalMonth=new Date(currentCalMonth.getFullYear(),currentCalMonth.getMonth()+1,1); renderCalendar(); }

// ── 팝업 ──
function showPopup(html){
  document.getElementById('popup-content').innerHTML=html;
  document.getElementById('popup-overlay').classList.remove('hidden');
}
function closePopup(){
  document.getElementById('popup-overlay').classList.add('hidden');
}

// ── 초기화 ──
renderHome();

// Service Worker 등록
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
</script>
</body>
</html>
