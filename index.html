function buildMcTimetable(){
  const sc = SCHEDULES[currentTTClass]||{};
  const grade = parseInt(currentTTClass[0]);
  const is2 = grade===2;
  const hc = is2 ? 'var(--primary2)' : 'var(--primary)';
  const COL_COLORS = {월:"#4472C4",화:"#70AD47",수:"#ED7D31",목:"#9B59B6",금:"#C00000"};

  function getSlot(day, slotIdx) {
    const daysc = sc[day]||[];
    if(!is2) {
      if(day==='월'||day==='수') {
        if(slotIdx===0) return daysc[0]||null;
        if(slotIdx===1) return daysc[1]||null;
        return null;
      } else {
        if(slotIdx===0) return '정규';
        if(slotIdx===1) return daysc[0]||null;
        if(slotIdx===2) return daysc[1]||null;
        return null;
      }
    } else {
      if(day==='수') {
        return daysc[slotIdx]||null;
      } else if(day==='월') {
        if(slotIdx===0) return '정규';
        if(slotIdx===1) return daysc[1]||null;
        if(slotIdx===2) return daysc[2]||null;
        return null;
      } else {
        if(slotIdx===0) return '정규';
        if(slotIdx===1) return daysc[0]||null;
        if(slotIdx===2) return daysc[1]||null;
        return null;
      }
    }
  }

  function getSlotKey(day, slotIdx) {
    if(!is2) {
      if(day==='월'||day==='수') return slotIdx===0?'s1':slotIdx===1?'s2':null;
      else return slotIdx===1?'s1':slotIdx===2?'s2':null;
    } else {
      if(day==='수') return slotIdx===0?'s1':slotIdx===1?'s2':null;
      else if(day==='월') return slotIdx===1?'s2':slotIdx===2?'s3':null;
      else return slotIdx===1?'s1':slotIdx===2?'s2':null;
    }
  }

  const slotKeys = ['s1','s2','s3'];
  const slotLabels = !is2
    ? ['맞춤형\n1교시','맞춤형\n1교시','맞춤형\n2교시']
    : ['맞춤형\n1교시','맞춤형\n2교시','맞춤형\n3교시'];

  function renderSlotRow(slotIdx) {
    const tlbl = slotLabels[slotIdx].replace('\n','<br>');
    const skey = slotKeys[slotIdx];
    return `<tr style="border-top:${slotIdx===0?'2px solid '+hc:'1px solid #E0E0E0'}">
      <td style="padding:5px 4px;background:${hc}18;font-size:8px;color:${hc};font-weight:800;text-align:center;line-height:1.4;white-space:pre-line;vertical-align:middle;min-width:52px">${tlbl}</td>
      ${DAYS.map(d=>{
        const [m2,dy2]=DAY_DATES[d].split('/');
        const yr2=new Date().getFullYear();
        const dk=`${yr2}-${String(m2).padStart(2,'0')}-${String(dy2).padStart(2,'0')}`;
        if(NO_CLASS_DATES&&NO_CLASS_DATES[dk]) return `<td style="padding:3px 2px;text-align:center"><div style="background:#EEEEEE;border-radius:6px;padding:6px 3px;font-size:8px;color:#BDBDBD;min-height:32px;display:flex;align-items:center;justify-content:center;">🚫 수업없음</div></td>`;
        const subj=getSlot(d,slotIdx);
        const realKey=getSlotKey(d,slotIdx);
        if(!subj) return `<td style="padding:3px 2px;text-align:center"><div style="background:#F5F5F5;border-radius:6px;padding:6px 3px;font-size:8px;color:#CCC;min-height:32px;display:flex;align-items:center;justify-content:center">—</div></td>`;
        if(subj==='정규') return `<td style="padding:3px 2px;text-align:center"><div style="background:#F0F2F8;border-radius:6px;padding:6px 3px;font-size:8px;color:#8892A4;min-height:32px;display:flex;align-items:center;justify-content:center">정규수업</div></td>`;
        if(currentTTClass==='2-4' && d==='수' && skey==='s1') {
          const c1=gc('창의과학'), c2=gc('주산암산');
          return `<td style="padding:3px 2px;text-align:center">
            <div onclick="showSubjDetail('창의과학','${d}','${realKey||skey}')"
              style="background:${c1}20;color:${c1};border:1.5px solid ${c1}66;border-radius:7px;padding:4px 3px;margin-bottom:2px;cursor:pointer;min-height:28px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px">
              <span style="font-weight:800;font-size:8px;line-height:1.2">창의과학</span>
              <span style="font-size:6px;opacity:0.7">일반</span>
            </div>
            <div onclick="showSubjDetail('주산암산','${d}','${realKey||skey}')"
              style="background:${c2}20;color:${c2};border:1.5px solid ${c2}66;border-radius:7px;padding:4px 3px;cursor:pointer;min-height:28px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px">
              <span style="font-weight:800;font-size:8px;line-height:1.2">주산암산</span>
              <span style="font-size:6px;opacity:0.7">특별수강</span>
            </div>
          </td>`;
        }
        const parts=subj.includes('+')?subj.split('+'):[subj];
        return `<td style="padding:3px 2px;text-align:center">${parts.map(p=>{
          p=p.trim();
          const color=gc(p); const place=getPlaceByDay(p,d,'s1');
          return `<div onclick="showSubjDetail('${p}','${d}','${realKey||skey}')"
            style="background:${color}20;color:${color};border:1.5px solid ${color}66;border-radius:7px;padding:5px 3px;margin-bottom:2px;cursor:pointer;min-height:34px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px">
            <span style="font-weight:800;font-size:9px;text-align:center;line-height:1.2">${p}</span>
            <span style="font-size:7px;opacity:0.75;text-align:center;line-height:1.2">${place.split(' ').slice(0,2).join(' ')}</span>
          </div>`;
        }).join('')}</td>`;
      }).join('')}
    </tr>`;
  }

  return `
    <div style="background:${hc};border-radius:12px 12px 0 0;padding:10px 14px;text-align:center">
      <div style="color:#fff;font-size:14px;font-weight:800">${getThisWeekRange().mon}(월) ~ ${getThisWeekRange().fri}(금) · 맞춤형 프로그램 시간표 · (${currentTTClass})</div>
    </div>
    <div style="background:#fff;border-radius:0 0 12px 12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.07)">
      <table style="width:100%;border-collapse:collapse">
        <tr>
          <th style="background:#2C3E50;color:#fff;padding:8px 4px;font-size:10px;text-align:center;width:52px">요일/시간</th>
          ${DAYS.map(d=>{
            const [m,dy]=DAY_DATES[d].split('/');
            const yr=new Date().getFullYear();
            const key=`${yr}-${String(m).padStart(2,'0')}-${String(dy).padStart(2,'0')}`;
            const noClass=NO_CLASS_DATES&&NO_CLASS_DATES[key];
            return `<th style="background:${noClass?'#9E9E9E':COL_COLORS[d]};color:#fff;padding:6px 2px;font-size:11px;font-weight:800;text-align:center">
              <div>${d}</div>
              <div style="font-size:9px;font-weight:400;opacity:0.9">${DAY_DATES[d]}</div>
              ${noClass?`<div style="font-size:7px;background:rgba(0,0,0,0.25);border-radius:4px;padding:1px 4px;margin-top:2px;">🚫 ${noClass}</div>`:''}
            </th>`;
          }).join('')}
        </tr>
        <tr style="background:#F5F5F5">
          <td style="padding:5px 4px;background:#ECEEF5;font-size:8px;color:#7B8CB0;font-weight:700;text-align:center">정규수업<br><span style="font-weight:400">~13:10</span></td>
          ${DAYS.map(d=>{
            const [m,dy]=DAY_DATES[d].split('/');
            const yr=new Date().getFullYear();
            const key=`${yr}-${String(m).padStart(2,'0')}-${String(dy).padStart(2,'0')}`;
            const noClass=NO_CLASS_DATES&&NO_CLASS_DATES[key];
            return noClass
              ? `<td style="padding:3px 2px;text-align:center" colspan="1"><div style="background:#EEEEEE;border-radius:6px;padding:6px 3px;font-size:8px;color:#9E9E9E;min-height:28px;display:flex;align-items:center;justify-content:center;">휴일</div></td>`
              : `<td style="padding:3px 2px;text-align:center"><div style="background:#F0F2F8;border-radius:6px;padding:6px 3px;font-size:8px;color:#8892A4;min-height:28px;display:flex;align-items:center;justify-content:center">정규수업</div></td>`;
          }).join('')}
        </tr>
        <!-- 점심 -->
        <tr style="background:#FFFBF0">
          <td style="padding:5px 4px;background:#FFF5D6;font-size:8px;color:#B8860B;font-weight:700;text-align:center">점심<br><span style="font-weight:400">11:30</span></td>
          ${DAYS.map(d=>{
            const [m,dy]=DAY_DATES[d].split('/');
            const yr=new Date().getFullYear();
            const key=`${yr}-${String(m).padStart(2,'0')}-${String(dy).padStart(2,'0')}`;
            const menu=LUNCH&&LUNCH[key]||[];
            return `<td style="padding:3px 2px;text-align:center">
              <div onclick="showLunchPopup('${d} ${DAY_DATES[d]}','${key}')"
                style="background:#FFF5D6;border-radius:6px;padding:5px 3px;font-size:9px;color:#B8860B;
                min-height:28px;display:flex;align-items:center;justify-content:center;
                cursor:pointer;border:1px solid ${menu.length?'#F0C040':'transparent'};">
                🍱
              </div>
            </td>`;
          }).join('')}
        </tr>
        ${renderSlotRow(0)+renderSlotRow(1)+renderSlotRow(2)}
        <tr style="background:#F0FFF4">
          <td style="padding:5px 4px;background:#D4EDDA;font-size:8px;color:#375623;font-weight:700;text-align:center">하교</td>
          ${DAYS.map(d=>`<td style="padding:3px 2px;text-align:center"><div style="background:#D4EDDA;border-radius:6px;padding:5px 3px;font-size:8px;color:#375623;min-height:28px;display:flex;align-items:center;justify-content:center">🏠 ${(!is2&&(d==='월'||d==='수'))||(is2&&d==='수')?'14:40':'15:20'}</div></td>`).join('')}
        </tr>
      </table>
    </div>
    <div style="background:#FFFFF2CC;border-radius:8px;padding:8px 12px;margin-top:8px;border:1px solid #E6D800">
      <div style="font-size:10px;color:#7B2C00">※ 화·목·금요일은 맞춤형 수업 13:50부터 시작합니다.</div>
      <div style="font-size:10px;color:#C55A11;font-weight:700;margin-top:3px">※ 화요일 로봇과학 수업은 수익자부담 · 2동 1층 전담교실 1 · 1교시 13:50~14:30 / 2교시 14:40~15:20</div>
    </div>
    <div style="background:var(--danger);border-radius:8px;padding:8px 12px;margin-top:6px;text-align:center">
      <div style="font-size:11px;color:#fff;font-weight:700">★ ${!is2?'월·수요일 하교: 14:40  /  화·목·금요일 하교: 15:20':'수요일 하교: 14:40  /  화·목·금요일 하교: 15:20'}</div>
    </div>`;
}

function showAfterSchoolDetail(encodedName){
  const name = decodeURIComponent(encodedName);
  const p = AFTER_SCHOOL.find(a=>a.name===name);
  if(!p) return;

  const AS_COLORS={
    '영어회화':'#375623','창의과학':'#17375E','주산암산':'#833C00','중국어회화':'#17375E',
    '바이올린':'#6A1B9A','칼라클레이':'#843C0C','도자공예':'#7B2C00','방송댄스':'#C00000',
    '음악줄넘기':'#1F3864','배드민턴':'#215868','로봇과학':'#FF6B35','보드게임':'#4B2A94',
    '창의미술':'#843C0C','토탈공예':'#833C00','사물놀이':'#B8860B','창의책놀이':'#2E7D32',
  };

function buildAfterSchoolTimetable(){
  const hc='#1565C0';
  const COL_COLORS={월:"#4472C4",화:"#70AD47",수:"#ED7D31",목:"#9B59B6",금:"#C00000"};

  // 요일별 수업 수집 및 시간 기준 정렬
  const byDay={};
  DAYS.forEach(d=>byDay[d]=[]);
  AFTER_SCHOOL.forEach(p=>{
    p.days.forEach(d=>{
      if(byDay[d]) byDay[d].push(p);
    });
  });
  DAYS.forEach(d=>byDay[d].sort((a,b)=>(a.timeA||'').localeCompare(b.timeA||'')));

  // 전체 시간대 수집 (행 구성용)
  const allTimes=[...new Set(AFTER_SCHOOL.flatMap(p=>[p.timeA,p.timeB].filter(Boolean)))].sort();

  // 수업명 색상
  const AS_COLORS={
    '영어회화':'#375623','창의과학':'#17375E','주산암산':'#833C00','중국어회화':'#17375E',
    '바이올린':'#6A1B9A','칼라클레이':'#843C0C','도자공예':'#7B2C00','방송댄스':'#C00000',
    '음악줄넘기':'#1F3864','배드민턴':'#215868','로봇과학':'#FF6B35','보드게임':'#4B2A94',
    '창의미술':'#843C0C','토탈공예':'#833C00','사물놀이':'#B8860B','창의책놀이':'#2E7D32',
  };
  function getColor(name){
    const base=name.replace(/\(.*\)$/,'').trim();
    for(const[k,v] of Object.entries(AS_COLORS)) if(base.includes(k)) return v;
    return '#1565C0';
  }

  // 행: 각 요일에 수업이 있는 시간대 행
  const maxRows=Math.max(...DAYS.map(d=>byDay[d].length),1);

  const rows=[];
  for(let i=0;i<maxRows;i++){
    rows.push(DAYS.map(d=>{
      const p=byDay[d][i]||null;
      if(!p) return `<td style="padding:3px 2px;text-align:center"><div style="background:#F5F5F5;border-radius:6px;padding:6px 3px;font-size:8px;color:#CCC;min-height:40px;display:flex;align-items:center;justify-content:center;">—</div></td>`;
      const c=getColor(p.name);
      const label=p.name.replace('컴퓨터(','').replace(')','');
      const placeShort=p.place.split(' ').slice(-2).join(' ');
      return `<td style="padding:3px 2px;text-align:center">
        <div onclick="showAfterSchoolDetail('${encodeURIComponent(p.name)}')"
          style="background:${c}18;color:${c};border:1.5px solid ${c}55;border-radius:7px;padding:4px 3px;
          min-height:44px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;cursor:pointer;">
          <span style="font-weight:800;font-size:8px;line-height:1.3;text-align:center;">${label}</span>
          <span style="font-size:7px;opacity:0.75;text-align:center;line-height:1.2;">${p.timeA}</span>
          <span style="font-size:6px;opacity:0.6;text-align:center;">${placeShort}</span>
        </div>
      </td>`;
    }));
  }

  return `
    <div style="background:${hc};border-radius:12px 12px 0 0;padding:10px 14px;text-align:center">
      <div style="color:#fff;font-size:14px;font-weight:800">🏫 방과후 프로그램 시간표 · ${AFTER_SCHOOL.length}개 수업</div>
    </div>
    <div style="background:#fff;border-radius:0 0 12px 12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.07)">
      <table style="width:100%;border-collapse:collapse">
        <tr>
          <th style="background:#2C3E50;color:#fff;padding:6px 4px;font-size:10px;text-align:center;width:18px">순</th>
          ${DAYS.map(d=>`<th style="background:${COL_COLORS[d]};color:#fff;padding:6px 2px;font-size:11px;font-weight:800;text-align:center">
            <div>${d}</div><div style="font-size:9px;font-weight:400;opacity:0.9">${DAY_DATES[d]}</div>
          </th>`).join('')}
        </tr>
        ${rows.map((cols,i)=>`<tr style="border-top:1px solid #E0E0E0">
          <td style="background:#F0F4FF;font-size:9px;color:#666;font-weight:700;text-align:center;padding:3px 2px;">${i+1}</td>
          ${cols.join('')}
        </tr>`).join('')}
      </table>
    </div>
    <div style="background:#E3F2FD;border-radius:8px;padding:8px 12px;margin-top:8px;border:1px solid #BBDEFB">
      <div style="font-size:10px;color:#1565C0;font-weight:700;">💡 수업명을 눌러 상세 정보 확인</div>
    </div>`;
}
function showAttendDetail(encodedKey){
  const [grade,cls,...nameParts]=decodeURIComponent(encodedKey).split('_');
  const name=nameParts.join('_');
  const recs=ATTEND_DB.filter(r=>r.g===grade&&r.c===cls&&r.n===name)
    .sort((a,b)=>a.d<b.d?-1:1);

  const TYPE_COLOR={"맞춤형 프로그램 참여하지 않음":"#DC2626","1교시만 참여 후 학원 이동":"#D97706","1교시만 참여 후 귀가":"#2563EB"};
  const TYPE_ICON={"맞춤형 프로그램 참여하지 않음":"✗","1교시만 참여 후 학원 이동":"🏫","1교시만 참여 후 귀가":"🏠"};
  const DAYS_KO=["일","월","화","수","목","금","토"];
  const gc=parseInt(grade)===1?"#1F3864":"#833C00";

  showPopup(`
    <div style="background:linear-gradient(135deg,${gc},${gc}CC);padding:16px 18px 14px;border-radius:18px 18px 0 0;">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <div>
          <div style="color:#fff;font-size:17px;font-weight:900;">${name}</div>
          <div style="color:rgba(255,255,255,0.8);font-size:12px;margin-top:2px;">${grade}학년 ${cls}반 · 총 ${recs.length}회 신청</div>
        </div>
        <button onclick="closePopup()" style="background:rgba(255,255,255,0.2);border:none;border-radius:20px;width:32px;height:32px;color:#fff;font-size:15px;cursor:pointer;">✕</button>
      </div>
    </div>
    <div style="padding:14px;max-height:60vh;overflow-y:auto;">
      ${recs.map((r,i)=>{
        const dt=new Date(r.d);
        const dow=DAYS_KO[dt.getDay()]||"?";
        const tc=TYPE_COLOR[r.t]||"#555";
        const icon=TYPE_ICON[r.t]||"•";
        const applyDate=r.cd&&r.cd!==r.d?r.cd:"";
        return `<div style="display:flex;gap:10px;padding:10px 0;border-bottom:${i<recs.length-1?"1px solid #F3F4F6":"none"};">
          <div style="flex-shrink:0;width:60px;text-align:center;">
            <div style="background:${tc}15;border-radius:8px;padding:6px 4px;">
              <div style="font-size:10px;color:${tc};font-weight:800;">${dow}요일</div>
              <div style="font-size:12px;font-weight:900;color:#374151;">${r.d.slice(5)}</div>
            </div>
          </div>
          <div style="flex:1;min-width:0;">
            <div style="margin-bottom:4px;">
              <span style="background:${tc}15;color:${tc};font-size:11px;font-weight:800;border-radius:5px;padding:2px 7px;">${icon} ${r.t.replace("맞춤형 프로그램 참여하지 않음","미참여").replace("1교시만 참여 후 학원 이동","1교시 후 학원").replace("1교시만 참여 후 귀가","1교시 후 귀가")}</span>
            </div>
            ${r.e&&r.e!=="nan"?`<div style="font-size:11px;color:#6B7280;">🚶 ${r.e}</div>`:""}
            ${r.note&&r.note!=="nan"&&r.note?`<div style="font-size:11px;color:#374151;margin-top:2px;">📝 ${r.note}</div>`:""}
            ${applyDate?`<div style="font-size:10px;color:#9CA3AF;margin-top:2px;">적용일: ${applyDate.slice(0,10)}</div>`:""}
          </div>
        </div>`;
      }).join("")}
    </div>
  `);
}

function renderAttendDB(){
  // 학생별 집계
  const byStudent = {};
  ATTEND_DB.forEach(r=>{
    const key = `${r.g}학년 ${r.c}반 ${r.n}`;
    if(!byStudent[key]) byStudent[key]={name:r.n,grade:r.g,cls:r.c,total:0,types:{},records:[]};
    byStudent[key].total++;
    byStudent[key].types[r.t]=(byStudent[key].types[r.t]||0)+1;
    byStudent[key].records.push(r);
  });

  // 유형별 색상
  const TYPE_COLOR={'맞춤형 프로그램 참여하지 않음':'#DC2626','1교시만 참여 후 학원 이동':'#D97706','1교시만 참여 후 귀가':'#2563EB'};
  const TYPE_LABEL={'맞춤형 프로그램 참여하지 않음':'미참여','1교시만 참여 후 학원 이동':'1교시 후 학원','1교시만 참여 후 귀가':'1교시 후 귀가'};
  const TYPE_ICON={'맞춤형 프로그램 참여하지 않음':'✗','1교시만 참여 후 학원 이동':'🏫','1교시만 참여 후 귀가':'🏠'};

  // 유형별 총계
  const typeTotals={};
  ATTEND_DB.forEach(r=>{ typeTotals[r.t]=(typeTotals[r.t]||0)+1; });

  const sorted = Object.values(byStudent).sort((a,b)=>b.total-a.total);
  const uniqStudents = sorted.length;

  return `
    <!-- 요약 통계 -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;">
      <div style="background:#FEE2E2;border-radius:12px;padding:12px;text-align:center;">
        <div style="font-size:22px;font-weight:900;color:#DC2626;">${ATTEND_DB.length}</div>
        <div style="font-size:11px;color:#DC2626;font-weight:700;">총 신청 건수</div>
      </div>
      <div style="background:#DBEAFE;border-radius:12px;padding:12px;text-align:center;">
        <div style="font-size:22px;font-weight:900;color:#1D4ED8;">${uniqStudents}</div>
        <div style="font-size:11px;color:#1D4ED8;font-weight:700;">신청 학생 수</div>
      </div>
    </div>
    <!-- 유형별 분포 -->
    <div style="background:#fff;border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,0.07);">
      <div style="font-size:12px;font-weight:800;color:#374151;margin-bottom:10px;">📊 신청 유형별 현황</div>
      ${Object.entries(typeTotals).map(([type,cnt])=>{
        const c=TYPE_COLOR[type]||'#555';
        const lbl=TYPE_LABEL[type]||type;
        const icon=TYPE_ICON[type]||'•';
        const pct=Math.round(cnt/ATTEND_DB.length*100);
        return `<div style="margin-bottom:8px;">
          <div style="display:flex;justify-content:space-between;margin-bottom:3px;">
            <span style="font-size:12px;font-weight:700;color:${c};">${icon} ${lbl}</span>
            <span style="font-size:12px;font-weight:800;color:${c};">${cnt}건 (${pct}%)</span>
          </div>
          <div style="background:#F3F4F6;border-radius:4px;height:6px;">
            <div style="background:${c};width:${pct}%;height:6px;border-radius:4px;"></div>
          </div>
        </div>`;
      }).join('')}
    </div>
    <!-- 학생별 상세 (다회 신청자 우선) -->
    <div style="font-size:12px;font-weight:800;color:#374151;margin-bottom:8px;">👤 학생별 신청 내역</div>
    ${sorted.map(stu=>{
      const gc=parseInt(stu.grade)===1?'#1F3864':'#833C00';
      const topType=Object.entries(stu.types).sort((a,b)=>b[1]-a[1])[0];
      const tc=TYPE_COLOR[topType?.[0]]||'#555';
      const lastRec=stu.records[stu.records.length-1];
      const key=encodeURIComponent(stu.grade+'_'+stu.cls+'_'+stu.name);
      return `<div onclick="showAttendDetail('${key}')" style="background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:8px;
        border-left:4px solid ${tc};box-shadow:0 1px 4px rgba(0,0,0,0.07);cursor:pointer;active:opacity:0.8;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
          <span style="font-size:14px;font-weight:900;color:#111;">${stu.name}</span>
          <span style="background:${gc}18;color:${gc};font-size:10px;font-weight:800;border-radius:4px;padding:1px 6px;">${stu.grade}학년 ${stu.cls}반</span>
          <span style="margin-left:auto;background:${tc}15;color:${tc};font-size:11px;font-weight:900;border-radius:6px;padding:2px 8px;">${stu.total}회</span>
          <span style="color:#D1D5DB;font-size:14px;">›</span>
        </div>
        <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:4px;">
          ${Object.entries(stu.types).map(([t,n])=>`
          <span style="background:${TYPE_COLOR[t]||'#555'}15;color:${TYPE_COLOR[t]||'#555'};font-size:10px;font-weight:700;border-radius:5px;padding:2px 7px;">
            ${TYPE_ICON[t]||'•'} ${TYPE_LABEL[t]||t} ${n}회
          </span>`).join('')}
        </div>
        <div style="font-size:10px;color:#9CA3AF;">최근: ${lastRec?.cd||lastRec?.d||'-'} · 탭하면 상세보기</div>
      </div>`;
    }).join('')}
    <div style="text-align:center;padding:12px;font-size:11px;color:#9CA3AF;">
      데이터 기준: 구글폼 DB (${ATTEND_DB[0]?.d||'-'} ~ ${ATTEND_DB[ATTEND_DB.length-1]?.d||'-'})
    </div>`;
}

        else if(tag.includes("⚠")) bc="#FF6B35";
        return `<div class="incident-card" style="border-color:${bc}">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap">
            <span style="background:${bc}22;color:${bc};border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700">${inc.date}</span>
            <span style="font-weight:800;font-size:13px;color:#7B2C00;flex:1">${inc.subject}</span>
            <span style="background:${bc}22;color:${bc};border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700">${tag}</span>
          </div>
          <div style="font-size:12px;font-weight:700;color:#B71C1C;margin-bottom:4px;white-space:pre-line">${inc.student}</div>
          <div style="font-size:12px;color:#555;line-height:18px;margin-bottom:6px;white-space:pre-line">${inc.content}</div>
          <div style="font-size:11px;color:${bc};font-weight:600">▶ ${inc.action}</div>
        </div>`;
      }).join('')}
    </div>
  `;
}

// ── 학사일정 ──
function renderCalendar(){
  const y=currentCalMonth.getFullYear(), m=currentCalMonth.getMonth();
  const today=new Date();
  const todayKey=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const monthNames=["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];
  const dayNames=["일","월","화","수","목","금","토"];
  const daysInMonth=new Date(y,m+1,0).getDate();
  const firstDay=new Date(y,m,1).getDay();
  const cells=[...Array(firstDay).fill(null),...Array.from({length:daysInMonth},(_,i)=>i+1)];
  while(cells.length%7!==0) cells.push(null);

  document.getElementById('screen-calendar').innerHTML = `
    <div style="background:var(--green);padding:20px;padding-top:calc(env(safe-area-inset-top,0px)+20px)">
      <button class="back-btn" onclick="goTo('home')">← 홈으로</button>
      <div style="color:#fff;font-size:20px;font-weight:800">학사일정</div>
      <div style="color:#fff;font-size:12px;opacity:0.7">2026년도 1학기</div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding:16px;background:#fff;border-bottom:1px solid var(--border)">
      <button onclick="prevMonth()" style="background:none;border:none;font-size:24px;color:var(--green);cursor:pointer;padding:4px 8px">‹</button>
      <span style="font-size:18px;font-weight:800">${y}년 ${monthNames[m]}</span>
      <button onclick="nextMonth()" style="background:none;border:none;font-size:24px;color:var(--green);cursor:pointer;padding:4px 8px">›</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);background:#F0F4F0;padding:6px 0">
      ${dayNames.map((d,i)=>`<div style="text-align:center;font-size:11px;font-weight:700;color:${i===0?'#E53935':i===6?'#1565C0':'#555'}">${d}</div>`).join('')}
    </div>
    <div class="cal-grid">
      ${Array.from({length:cells.length/7},(_,row)=>
        cells.slice(row*7,(row+1)*7).map((d,col)=>{
          if(!d) return `<div class="cal-cell" style="border-bottom:1px solid #F0F0F0"></div>`;
          const key=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          const isToday=key===todayKey;
          const hasEv=!!CALENDAR[key];
          const isHol=CALENDAR[key]?.some(e=>e.type==='holiday');
          const dayColor=col===0?'#E53935':col===6?'#1565C0':isHol?'#E53935':'var(--text)';
          return `<div class="cal-cell" style="border-bottom:1px solid #F0F0F0" onclick="showCalEvent('${key}')">
            <div style="${isToday?'background:var(--green);color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;margin:0 auto;':''}font-size:13px;font-weight:${isToday?'800':'400'};color:${isToday?'#fff':dayColor}">${d}</div>
            ${hasEv?`<div style="width:5px;height:5px;border-radius:50%;background:${isHol?'#E53935':'#2E7D32'};margin:2px auto 0"></div>`:''}
          </div>`;
        }).join('')
      ).join('')}
    </div>
    <div style="margin:12px;border-radius:12px;overflow:hidden;border:1px solid #C8E6C9">
      <div style="background:var(--green);padding:10px"><span style="color:#fff;font-weight:800;font-size:13px">${monthNames[m]} 주요 일정</span></div>
      ${Array.from({length:daysInMonth},(_,i)=>i+1).filter(d=>CALENDAR[`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`]).map(d=>{
        const key=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const evs=CALENDAR[key];
        const isHol=evs.some(e=>e.type==='holiday');
        const dayN=dayNames[new Date(y,m,d).getDay()];
        return `<div style="padding:10px;border-bottom:1px solid #F0F0F0;display:flex;gap:10px">
          <div style="width:40px;text-align:center">
            <div style="font-size:13px;font-weight:700;color:${isHol?'#E53935':'var(--green)'}">${d}일</div>
            <div style="font-size:10px;color:var(--muted)">${dayN}</div>
          </div>
          <div style="flex:1">
            ${evs.map(ev=>`<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
              <div style="width:6px;height:6px;border-radius:50%;background:${ev.type==='holiday'?'#E53935':ev.type==='vacation'?'#1565C0':'#FF6B35'}"></div>
              <span style="font-size:12px">${ev.label}</span>
            </div>`).join('')}
          </div>
        </div>`;
      }).join('') || '<div style="padding:12px;text-align:center;color:var(--muted);font-size:13px">이번 달 등록된 일정 없음</div>'}
    </div>
  `;
}

function showCalEvent(key){
  const evs = CALENDAR[key];
  if(!evs) return;
  const [y,m,d] = key.split('-');
  showPopup(`
    <div style="background:var(--green);padding:16px;border-radius:18px 18px 0 0">
      <div style="color:#fff;font-size:16px;font-weight:800">${parseInt(m)}월 ${parseInt(d)}일</div>
    </div>
    <div style="padding:16px">
      ${evs.map(ev=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)">
        <div style="width:8px;height:8px;border-radius:50%;background:${ev.type==='holiday'?'#E53935':ev.type==='vacation'?'#1565C0':'#FF6B35'}"></div>
        <span style="font-size:14px;font-weight:600">${ev.label}</span>
      </div>`).join('')}
      <button onclick="closePopup()" style="width:100%;background:var(--green);color:#fff;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;margin-top:14px">닫기</button>
    </div>
  `);
}

function prevMonth(){ currentCalMonth=new Date(currentCalMonth.getFullYear(),currentCalMonth.getMonth()-1,1); renderCalendar(); }
function nextMonth(){ currentCalMonth=new Date(currentCalMonth.getFullYear(),currentCalMonth.getMonth()+1,1); renderCalendar(); }

// ── 팝업 ──
function showPopup(html){
  document.getElementById('popup-content').innerHTML=html;
  document.getElementById('popup-overlay').classList.remove('hidden');
}
function closePopup(){
  document.getElementById('popup-overlay').classList.add('hidden');
}

// ── 초기화 ──
renderHome();
fetchWeather();

// Service Worker 등록
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
</script>
</body>
</html>
